<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="white" />

  <!-- Main Container -->
  <rect x="50" y="150" width="700" height="300" rx="30" ry="30" fill="none" stroke="#3498db" stroke-width="6" />

  <!-- Definitions for Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black" />
    </marker>
  </defs>

  <!-- Encoder Box -->
  <rect x="100" y="200" width="250" height="200" rx="20" ry="20" fill="#e8f5e9" stroke="#333" stroke-width="3" />
  <text x="225" y="310" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#333">ENCODERS</text>

  <!-- Decoder Box -->
  <rect x="450" y="200" width="250" height="200" rx="20" ry="20" fill="#fce4ec" stroke="#333" stroke-width="3" />
  <text x="575" y="310" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#333">DECODERS</text>

  <!-- Arrow: Encoder -> Decoder -->
  <line x1="350" y1="300" x2="450" y2="300" stroke="black" stroke-width="5" marker-end="url(#arrowhead)" />

  <!-- Input Box -->
  <rect x="100" y="480" width="250" height="60" rx="15" ry="15" fill="#e8f5e9" stroke="#333" stroke-width="2" />
  <text x="225" y="515" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#333">
    <tspan x="225" dy="0">INPUT</tspan>
    <tspan x="225" dy="20">Je suis étudiant</tspan>
  </text>

  <!-- Input Arrow: Input Box -> Encoder -->
  <line x1="225" y1="480" x2="225" y2="400" stroke="black" stroke-width="5" marker-end="url(#arrowhead)" />

  <!-- Output Box -->
  <rect x="450" y="50" width="250" height="60" rx="15" ry="15" fill="#fce4ec" stroke="#333" stroke-width="2" />
  <text x="575" y="85" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#333">
    <tspan x="575" dy="0">OUTPUT</tspan>
    <tspan x="575" dy="20">I am a student</tspan>
  </text>

  <!-- Output Arrow: Decoder -> Output Box -->
  <line x1="575" y1="200" x2="575" y2="110" stroke="black" stroke-width="5" marker-end="url(#arrowhead)" />
</svg>
