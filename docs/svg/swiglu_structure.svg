<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#1a1a1a" />
  
  <!-- Definitions for arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ffff" />
    </marker>
    <marker id="arrowhead-white" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="65" fill="#00ffff" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">SwiGLU Structure</text>

  <!-- Input x -->
  <rect x="100" y="150" width="60" height="100" rx="5" fill="#333" stroke="#00ffff" stroke-width="2" />
  <text x="130" y="205" fill="#fff" font-family="Arial" font-size="14" text-anchor="middle">Input x</text>

  <!-- Arrow from Input to W_gate and W_up -->
  <!-- Arrow from Input to W_gate -->
  <line x1="160" y1="200" x2="210" y2="200" stroke="#00ffff" stroke-width="2" marker-end="url(#arrowhead)" />
  <!-- Arrow from Input to W_up -->
  <line x1="160" y1="200" x2="210" y2="300" stroke="#00ffff" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- W_gate Layer -->
  <rect x="210" y="150" width="100" height="100" rx="5" fill="#2c3e50" stroke="#00ffff" stroke-width="2" />
  <text x="260" y="190" fill="#fff" font-family="Arial" font-size="12" text-anchor="middle">W_gate</text>
  <text x="260" y="220" fill="#aaa" font-family="Arial" font-size="10" text-anchor="middle">d_model → d_ff</text>

  <!-- Arrow from W_gate to Swish -->
  <line x1="310" y1="200" x2="320" y2="200" stroke="#00ffff" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Swish Activation -->
  <rect x="320" y="170" width="60" height="60" rx="30" fill="#4a148c" stroke="#00ffff" stroke-width="2" />
  <text x="350" y="210" fill="#fff" font-family="Arial" font-size="14" text-anchor="middle">Swish</text>

  <!-- Arrow from Swish to ⊗ (top input) -->
  <line x1="380" y1="200" x2="450" y2="220" stroke="#00ffff" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- W_up Layer -->
  <rect x="210" y="250" width="100" height="100" rx="5" fill="#2c3e50" stroke="#00ffff" stroke-width="2" />
  <text x="260" y="290" fill="#fff" font-family="Arial" font-size="12" text-anchor="middle">W_up</text>
  <text x="260" y="320" fill="#aaa" font-family="Arial" font-size="10" text-anchor="middle">d_model → d_ff</text>

  <!-- Arrow from W_up to ⊗ (bottom input) -->
  <line x1="310" y1="300" x2="450" y2="280" stroke="#00ffff" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Element-wise Multiplication (⊗) -->
  <circle cx="450" cy="250" r="30" fill="#1a237e" stroke="#00ffff" stroke-width="2" />
  <text x="450" y="255" fill="#fff" font-family="Arial" font-size="20" text-anchor="middle">⊗</text>

  <!-- Arrow from ⊗ to W_down -->
  <line x1="480" y1="250" x2="530" y2="250" stroke="#00ffff" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- W_down Layer -->
  <rect x="530" y="200" width="100" height="100" rx="5" fill="#2c3e50" stroke="#00ffff" stroke-width="2" />
  <text x="580" y="240" fill="#fff" font-family="Arial" font-size="12" text-anchor="middle">W_down</text>
  <text x="580" y="270" fill="#aaa" font-family="Arial" font-size="10" text-anchor="middle">d_ff → d_model</text>

  <!-- Arrow from W_down to Output -->
  <line x1="630" y1="250" x2="680" y2="250" stroke="#00ffff" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Output -->
  <rect x="680" y="220" width="40" height="60" rx="5" fill="#333" stroke="#00ffff" stroke-width="2" />
  <text x="700" y="250" fill="#fff" font-family="Arial" font-size="12" text-anchor="middle">Output</text>

  <!-- Formula at bottom -->
  <text x="400" y="375" fill="#aaa" font-family="Arial" font-size="12" text-anchor="middle">FFN_SwiGLU(x) = (Swish(xW_gate) ⊗ (xW_up))W_down</text>
</svg>
