<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#1a1a2e"/>
  
  <!-- 標題 -->
  <text x="400" y="35" text-anchor="middle" fill="#eaeaea" font-size="20" font-weight="bold">香農失真 - 率函數（Shannon Distortion-Rate Function）</text>
  
  <!-- 座標軸區域 -->
  <g transform="translate(80, 60)">
    <!-- 網格線 -->
    <g stroke="#333355" stroke-width="1" stroke-dasharray="5,5">
      <line x1="0" y1="0" x2="640" y2="0"/>
      <line x1="0" y1="60" x2="640" y2="60"/>
      <line x1="0" y1="120" x2="640" y2="120"/>
      <line x1="0" y1="180" x2="640" y2="180"/>
      <line x1="0" y1="240" x2="640" y2="240"/>
      <line x1="0" y1="300" x2="640" y2="300"/>
      <line x1="0" y1="360" x2="640" y2="360"/>
      
      <line x1="0" y1="0" x2="0" y2="360"/>
      <line x1="80" y1="0" x2="80" y2="360"/>
      <line x1="160" y1="0" x2="160" y2="360"/>
      <line x1="240" y1="0" x2="240" y2="360"/>
      <line x1="320" y1="0" x2="320" y2="360"/>
      <line x1="400" y1="0" x2="400" y2="360"/>
      <line x1="480" y1="0" x2="480" y2="360"/>
      <line x1="560" y1="0" x2="560" y2="360"/>
      <line x1="640" y1="0" x2="640" y2="360"/>
    </g>
    
    <!-- 座標軸 -->
    <g stroke="#8888aa" stroke-width="2">
      <line x1="0" y1="0" x2="0" y2="360"/>
      <line x1="0" y1="360" x2="640" y2="360"/>
    </g>
    
    <!-- Y 軸刻度標籤 -->
    <g fill="#aaaaaa" font-size="12" text-anchor="end">
      <text x="-5" y="5">1.0</text>
      <text x="-5" y="65">0.25</text>
      <text x="-5" y="125">0.0625</text>
      <text x="-5" y="185">0.0156</text>
      <text x="-5" y="245">0.0039</text>
      <text x="-5" y="305">0.0010</text>
      <text x="-5" y="365">0.0002</text>
    </g>
    
    <!-- X 軸刻度標籤 -->
    <g fill="#aaaaaa" font-size="12" text-anchor="middle">
      <text x="0" y="380">0</text>
      <text x="80" y="380">1</text>
      <text x="160" y="380">2</text>
      <text x="240" y="380">3</text>
      <text x="320" y="380">4</text>
      <text x="400" y="380">5</text>
      <text x="480" y="380">6</text>
      <text x="560" y="380">7</text>
      <text x="640" y="380">8</text>
    </g>
    
    <!-- 軸標籤 -->
    <text x="320" y="415" text-anchor="middle" fill="#eaeaea" font-size="14" font-weight="bold">碼率 R (bits per sample)</text>
    <text x="-50" y="180" text-anchor="middle" fill="#eaeaea" font-size="14" font-weight="bold" transform="rotate(-90, -50, 180)">失真 D(R)</text>
    
    <!-- 香農下界曲線 (理論極限) -->
    <!-- D(R) = 2^(-2R)，使用對數尺度 -->
    <path d="M 0,0 L 80,120 L 160,240 L 240,300 L 320,330 L 400,345 L 480,352 L 560,356 L 640,358" 
          fill="none" stroke="#00ff88" stroke-width="3" stroke-dasharray="10,5"/>
    
    <!-- TurboQuant 曲線 (實際) -->
    <!-- D(R) ≈ 4.71 * 2^(-2R)，比香農下界高約 4.71 倍 -->
    <path d="M 0,-40 L 80,80 L 160,200 L 240,270 L 320,305 L 400,325 L 480,338 L 560,345 L 640,350" 
          fill="none" stroke="#ff6b6b" stroke-width="3"/>
    
    <!-- 純量量化曲線 (Lloyd-Max) -->
    <path d="M 0,-30 L 80,90 L 160,210 L 240,280 L 320,315 L 400,335 L 480,348" 
          fill="none" stroke="#4ecdc4" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- 數據點標記 -->
    <g>
      <!-- 香農下界數據點 -->
      <circle cx="0" cy="0" r="4" fill="#00ff88"/>
      <circle cx="80" cy="120" r="4" fill="#00ff88"/>
      <circle cx="160" cy="240" r="4" fill="#00ff88"/>
      <circle cx="240" cy="300" r="4" fill="#00ff88"/>
      <circle cx="320" cy="330" r="4" fill="#00ff88"/>
      
      <!-- TurboQuant 數據點 -->
      <circle cx="0" cy="-40" r="4" fill="#ff6b6b"/>
      <circle cx="80" cy="80" r="4" fill="#ff6b6b"/>
      <circle cx="160" cy="200" r="4" fill="#ff6b6b"/>
      <circle cx="240" cy="270" r="4" fill="#ff6b6b"/>
      <circle cx="320" cy="305" r="4" fill="#ff6b6b"/>
    </g>
  </g>
  
  <!-- 圖例 -->
  <g transform="translate(520, 80)" fill="#eaeaea" font-size="12">
    <rect x="0" y="-15" width="200" height="90" fill="#252540" stroke="#444466" rx="5"/>
    
    <line x1="10" y1="10" x2="40" y2="10" stroke="#00ff88" stroke-width="3" stroke-dasharray="10,5"/>
    <text x="50" y="15" fill="#aaaaaa">香農下界 (理論極限)</text>
    
    <line x1="10" y1="35" x2="40" y2="35" stroke="#ff6b6b" stroke-width="3"/>
    <text x="50" y="40" fill="#aaaaaa">TurboQuant (實際)</text>
    
    <line x1="10" y1="60" x2="40" y2="60" stroke="#4ecdc4" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="50" y="65" fill="#aaaaaa">Lloyd-Max 純量量化</text>
  </g>
  
  <!-- 關鍵註解 -->
  <g transform="translate(80, 450)" fill="#aaaaaa" font-size="11">
    <text x="0" y="0">每增加 1 bit：失真減少為 1/4 (6 dB 增益)</text>
    <text x="350" y="0">TurboQuant 與理論極限差距約 4.71 倍</text>
  </g>
  
  <!-- 陰影區域：理論不可達區域 -->
  <g transform="translate(80, 60)" opacity="0.3">
    <rect x="0" y="0" width="640" height="360" fill="none"/>
    <path d="M 0,0 L 80,120 L 160,240 L 240,300 L 320,330 L 400,345 L 480,352 L 560,356 L 640,358 L 640,360 L 0,360 Z" 
          fill="#00ff88" opacity="0.1"/>
    <text x="500" y="340" fill="#00ff88" font-size="10" opacity="0.7">理論下界以下不可達</text>
  </g>
</svg>
