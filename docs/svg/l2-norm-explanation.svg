<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- 定義漸層和樣式 -->
  <defs>
    <linearGradient id="gridGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ecca3" />
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="400" height="400" fill="url(#gridGradient)" />
  
  <!-- 網格線 -->
  <g stroke="#2a2a4e" stroke-width="1">
    <line x1="50" y1="50" x2="50" y2="350" />
    <line x1="50" y1="350" x2="350" y2="350" />
    <!-- 水平網格線 -->
    <line x1="50" y1="100" x2="350" y2="100" stroke-dasharray="3,3" />
    <line x1="50" y1="150" x2="350" y2="150" stroke-dasharray="3,3" />
    <line x1="50" y1="200" x2="350" y2="200" stroke-dasharray="3,3" />
    <line x1="50" y1="250" x2="350" y2="250" stroke-dasharray="3,3" />
    <line x1="50" y1="300" x2="350" y2="300" stroke-dasharray="3,3" />
    <!-- 垂直網格線 -->
    <line x1="100" y1="50" x2="100" y2="350" stroke-dasharray="3,3" />
    <line x1="150" y1="50" x2="150" y2="350" stroke-dasharray="3,3" />
    <line x1="200" y1="50" x2="200" y2="350" stroke-dasharray="3,3" />
    <line x1="250" y1="50" x2="250" y2="350" stroke-dasharray="3,3" />
    <line x1="300" y1="50" x2="300" y2="350" stroke-dasharray="3,3" />
  </g>
  
  <!-- 座標軸標籤 -->
  <text x="340" y="345" fill="#a0a0a0" font-family="Arial, sans-serif" font-size="14">x</text>
  <text x="35" y="65" fill="#a0a0a0" font-family="Arial, sans-serif" font-size="14">y</text>
  <text x="45" y="345" fill="#a0a0a0" font-family="Arial, sans-serif" font-size="12">0</text>
  
  <!-- 刻度標籤 -->
  <text x="110" y="365" fill="#666" font-family="Arial, sans-serif" font-size="11">1</text>
  <text x="160" y="365" fill="#666" font-family="Arial, sans-serif" font-size="11">2</text>
  <text x="210" y="365" fill="#666" font-family="Arial, sans-serif" font-size="11">3</text>
  <text x="260" y="365" fill="#666" font-family="Arial, sans-serif" font-size="11">4</text>
  <text x="310" y="365" fill="#666" font-family="Arial, sans-serif" font-size="11">5</text>
  
  <text x="30" y="305" fill="#666" font-family="Arial, sans-serif" font-size="11">1</text>
  <text x="30" y="255" fill="#666" font-family="Arial, sans-serif" font-size="11">2</text>
  <text x="30" y="205" fill="#666" font-family="Arial, sans-serif" font-size="11">3</text>
  <text x="30" y="155" fill="#666" font-family="Arial, sans-serif" font-size="11">4</text>
  <text x="30" y="105" fill="#666" font-family="Arial, sans-serif" font-size="11">5</text>
  
  <!-- 投影線（虛線） -->
  <line x1="200" y1="350" x2="200" y2="200" stroke="#4ecca3" stroke-width="1" stroke-dasharray="5,5" opacity="0.6" />
  <line x1="50" y1="200" x2="200" y2="200" stroke="#4ecca3" stroke-width="1" stroke-dasharray="5,5" opacity="0.6" />
  
  <!-- 向量（主體） -->
  <line x1="50" y1="350" x2="200" y2="200" stroke="#4ecca3" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- 終點標記 -->
  <circle cx="200" cy="200" r="5" fill="#4ecca3" />
  
  <!-- 長度標註弧線 -->
  <path d="M 50 350 A 150 150 0 0 1 200 200" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,5" opacity="0.8" />
  
  <!-- 長度標籤 -->
  <text x="140" y="260" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="16" font-weight="bold">‖v‖₂ = 5</text>
  
  <!-- 向量標籤 -->
  <text x="210" y="190" fill="#4ecca3" font-family="Arial, sans-serif" font-size="14" font-weight="bold">v = [3, 4]</text>
  
  <!-- 直角三角形邊長標籤 -->
  <text x="120" y="340" fill="#a0a0a0" font-family="Arial, sans-serif" font-size="12">x = 3</text>
  <text x="15" y="280" fill="#a0a0a0" font-family="Arial, sans-serif" font-size="12" transform="rotate(-90 15,280)">y = 4</text>
  
  <!-- 標題 -->
  <text x="200" y="30" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">L2 Norm 視覺化</text>
  <text x="200" y="48" fill="#a0a0a0" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">歐幾里得距離 = √(3² + 4²) = 5</text>
</svg>
