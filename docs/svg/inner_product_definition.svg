<svg width="720" height="520" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#81c784"/>
    </marker>
    <marker id="arr-proj" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e879f9"/>
    </marker>
    <marker id="arr-axis" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Projection area fill -->
    <linearGradient id="proj-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" fill="url(#bg-grad)" rx="12"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">內積的幾何意義（Geometric Meaning of Inner Product）</text>

  <!-- Main diagram area -->
  <g transform="translate(80, 70)">
    <!-- Subtle grid -->
    <g stroke="#2a2d3a" stroke-width="0.5">
      <line x1="0" y1="0" x2="0" y2="320"/><line x1="50" y1="0" x2="50" y2="320"/>
      <line x1="100" y1="0" x2="100" y2="320"/><line x1="150" y1="0" x2="150" y2="320"/>
      <line x1="200" y1="0" x2="200" y2="320"/><line x1="250" y1="0" x2="250" y2="320"/>
      <line x1="300" y1="0" x2="300" y2="320"/><line x1="350" y1="0" x2="350" y2="320"/>
      <line x1="400" y1="0" x2="400" y2="320"/><line x1="450" y1="0" x2="450" y2="320"/>
      <line x1="500" y1="0" x2="500" y2="320"/>
      <line x1="0" y1="0" x2="500" y2="0"/><line x1="0" y1="50" x2="500" y2="50"/>
      <line x1="0" y1="100" x2="500" y2="100"/><line x1="0" y1="150" x2="500" y2="150"/>
      <line x1="0" y1="200" x2="500" y2="200"/><line x1="0" y1="250" x2="500" y2="250"/>
      <line x1="0" y1="300" x2="500" y2="300"/>
    </g>

    <!-- Axes -->
    <line x1="0" y1="290" x2="490" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arr-axis)"/>
    <line x1="0" y1="290" x2="0" y2="10" stroke="#555" stroke-width="1.5" marker-end="url(#arr-axis)"/>
    <text x="495" y="305" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#777">e₁</text>
    <text x="8" y="8" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#777">e₂</text>
    <text x="-15" y="305" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#777">O</text>

    <!-- Vector b (green) - along a direction, roughly 25° from horizontal -->
    <line x1="0" y1="290" x2="400" y2="105" stroke="#81c784" stroke-width="2.8" marker-end="url(#arr-b)" filter="url(#glow-green)"/>
    <text x="405" y="100" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="bold" fill="#81c784">b</text>
    <circle cx="400" cy="105" r="4" fill="#81c784" filter="url(#glow-green)"/>

    <!-- Vector a (cyan) - steeper, roughly 55° from horizontal -->
    <line x1="0" y1="290" x2="200" y2="40" stroke="#4fc3f7" stroke-width="2.8" marker-end="url(#arr-a)" filter="url(#glow-cyan)"/>
    <text x="205" y="35" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="bold" fill="#4fc3f7">a</text>
    <circle cx="200" cy="40" r="4" fill="#4fc3f7" filter="url(#glow-cyan)"/>

    <!-- Projection of a onto b direction -->
    <!-- b direction unit: (400, -185)/|...|, |b| ≈ 440.6 -->
    <!-- proj of a onto b: dot(a,b)/|b|^2 * b -->
    <!-- a = (200, -250), b = (400, -185) -->
    <!-- dot = 200*400 + 250*185 = 80000+46250 = 126250 -->
    <!-- |b|^2 = 160000+34225 = 194225 -->
    <!-- scalar = 126250/194225 ≈ 0.650 -->
    <!-- proj point = 0.650 * (400, -185) = (260, -120.25) → screen (260, 290-120.25) = (260, 169.75) -->
    <line x1="200" y1="40" x2="260" y2="170" stroke="#4fc3f7" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.6"/>
    <circle cx="260" cy="170" r="5" fill="#e879f9" filter="url(#glow-pink)"/>

    <!-- Projection segment on b direction (pink/magenta) -->
    <line x1="0" y1="290" x2="260" y2="170" stroke="#e879f9" stroke-width="4" stroke-linecap="round" filter="url(#glow-pink)" opacity="0.85"/>

    <!-- Right angle marker at projection point -->
    <polyline points="248,178 256,186 264,178" fill="none" stroke="#e879f9" stroke-width="1.2" opacity="0.7"/>

    <!-- Projection label -->
    <text x="100" y="215" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold" fill="#e879f9">proj_b(a)</text>
    <text x="100" y="232" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#d4a4e8">= ‖a‖·cos θ</text>

    <!-- Angle arc between a and b -->
    <!-- a direction angle ≈ -51.3° from horizontal (atan2(-250,200)) -->
    <!-- b direction angle ≈ -24.8° from horizontal (atan2(-185,400)) -->
    <!-- Arc from b direction to a direction -->
    <path d="M 55 265 A 40 40 0 0 1 35 248" fill="none" stroke="#ffd54f" stroke-width="1.8" stroke-dasharray="4,3"/>
    <text x="58" y="258" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="bold" fill="#ffd54f">θ</text>

    <!-- Projection area (shaded) -->
    <polygon points="0,290 260,170 200,40" fill="url(#proj-area)" stroke="none"/>

    <!-- Norm labels -->
    <!-- ‖a‖ label along vector a -->
    <text x="80" y="155" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7" transform="rotate(-51.3, 80, 155)">‖a‖</text>

    <!-- ‖b‖ label along vector b -->
    <text x="220" y="185" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#81c784" transform="rotate(-24.8, 220, 185)">‖b‖</text>
  </g>

  <!-- Formula box (right side) -->
  <rect x="490" y="70" width="215" height="200" rx="10" fill="#1a1d2e" stroke="#3a3f55" stroke-width="1.2"/>
  <text x="597" y="95" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">內積的定義</text>
  <line x1="505" y1="105" x2="690" y2="105" stroke="#3a3f55" stroke-width="0.5"/>

  <!-- Formula 1: algebraic -->
  <text x="597" y="130" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#aaa">代數定義：</text>
  <text x="597" y="152" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">⟨a, b⟩ = Σ aᵢ · bᵢ</text>

  <!-- Formula 2: geometric -->
  <text x="597" y="180" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#aaa">幾何定義：</text>
  <text x="597" y="202" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#81c784">⟨a, b⟩ = ‖a‖·‖b‖·cos θ</text>

  <!-- Formula 3: projection meaning -->
  <text x="597" y="230" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#aaa">投影意義：</text>
  <text x="597" y="252" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#e879f9">⟨a, b⟩ = ‖b‖·(‖a‖cos θ)</text>

  <!-- Legend box -->
  <rect x="490" y="285" width="215" height="120" rx="8" fill="#1a1d2e" stroke="#3a3f55" stroke-width="1"/>
  <text x="597" y="307" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0">圖例</text>
  <line x1="505" y1="317" x2="690" y2="317" stroke="#3a3f55" stroke-width="0.5"/>

  <line x1="505" y1="335" x2="530" y2="335" stroke="#4fc3f7" stroke-width="2.5"/>
  <circle cx="530" cy="335" r="3" fill="#4fc3f7"/>
  <text x="538" y="339" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#4fc3f7">a（向量 a）</text>

  <line x1="505" y1="357" x2="530" y2="357" stroke="#81c784" stroke-width="2.5"/>
  <circle cx="530" cy="357" r="3" fill="#81c784"/>
  <text x="538" y="361" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#81c784">b（向量 b）</text>

  <line x1="505" y1="379" x2="530" y2="379" stroke="#e879f9" stroke-width="4" stroke-linecap="round"/>
  <text x="538" y="383" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#e879f9">a 在 b 上的投影</text>

  <line x1="505" y1="397" x2="530" y2="397" stroke="#ffd54f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="538" y="401" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#ffd54f">θ（夾角）</text>

  <!-- Key insight box at bottom -->
  <rect x="30" y="430" width="660" height="76" rx="8" fill="#0d1a2e" stroke="#4fc3f7" stroke-width="1" opacity="0.9"/>
  
  <text x="360" y="455" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#e0e0e0">
    <tspan font-weight="bold" fill="#4fc3f7">核心概念：</tspan>
    <tspan fill="#ccc">內積 = 向量 a 在向量 b 方向上的投影長度 × 向量 b 的長度</tspan>
  </text>
  <text x="360" y="478" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#aaa">
    當 θ = 0° 時，⟨a, b⟩ = ‖a‖·‖b‖（最大值）｜當 θ = 90° 時，⟨a, b⟩ = 0（正交）｜當 θ = 180° 時，⟨a, b⟩ = −‖a‖·‖b‖（最小值）
  </text>
  <text x="360" y="498" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#777">
    內積衡量兩個向量的「方向一致性」：正值 = 同方向，零 = 垂直，負值 = 反方向
  </text>
</svg>