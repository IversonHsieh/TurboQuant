<svg width="720" height="520" viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#81c784"/>
    </marker>
    <marker id="arr-proj" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e879f9"/>
    </marker>
    <marker id="arr-axis" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="proj-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" fill="url(#bg-grad)" rx="12"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">內積的幾何意義（Geometric Meaning of Inner Product）</text>

  <!-- Main diagram area -->
  <g transform="translate(60, 65)">
    <!-- Subtle grid -->
    <g stroke="#2a2d3a" stroke-width="0.5">
      <line x1="0" y1="0" x2="0" y2="320"/><line x1="50" y1="0" x2="50" y2="320"/>
      <line x1="100" y1="0" x2="100" y2="320"/><line x1="150" y1="0" x2="150" y2="320"/>
      <line x1="200" y1="0" x2="200" y2="320"/><line x1="250" y1="0" x2="250" y2="320"/>
      <line x1="300" y1="0" x2="300" y2="320"/><line x1="350" y1="0" x2="350" y2="320"/>
      <line x1="400" y1="0" x2="400" y2="320"/><line x1="450" y1="0" x2="450" y2="320"/>
      <line x1="0" y1="0" x2="450" y2="0"/><line x1="0" y1="50" x2="450" y2="50"/>
      <line x1="0" y1="100" x2="450" y2="100"/><line x1="0" y1="150" x2="450" y2="150"/>
      <line x1="0" y1="200" x2="450" y2="200"/><line x1="0" y1="250" x2="450" y2="250"/>
      <line x1="0" y1="300" x2="450" y2="300"/>
    </g>

    <!-- Axes -->
    <line x1="0" y1="290" x2="440" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arr-axis)"/>
    <line x1="0" y1="290" x2="0" y2="10" stroke="#555" stroke-width="1.5" marker-end="url(#arr-axis)"/>
    <text x="445" y="305" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#777">e₁</text>
    <text x="8" y="8" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#777">e₂</text>
    <text x="-15" y="305" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#777">O</text>

    <!-- Vector b (green) - endpoint at (340, 130) within group -->
    <line x1="0" y1="290" x2="340" y2="130" stroke="#81c784" stroke-width="2.8" marker-end="url(#arr-b)" filter="url(#glow-green)"/>
    <text x="348" y="125" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="bold" fill="#81c784">b</text>
    <circle cx="340" cy="130" r="4" fill="#81c784" filter="url(#glow-green)"/>

    <!-- Vector a (cyan) - endpoint at (200, 40) within group -->
    <line x1="0" y1="290" x2="200" y2="40" stroke="#4fc3f7" stroke-width="2.8" marker-end="url(#arr-a)" filter="url(#glow-cyan)"/>
    <text x="208" y="38" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="bold" fill="#4fc3f7">a</text>
    <circle cx="200" cy="40" r="4" fill="#4fc3f7" filter="url(#glow-cyan)"/>

    <!-- Projection of a onto b direction -->
    <!-- a = (200, -250), b = (340, -160) -->
    <!-- dot = 200*340 + 250*160 = 68000+40000 = 108000 -->
    <!-- |b|^2 = 340^2 + 160^2 = 115600+25600 = 141200 -->
    <!-- scalar = 108000/141200 ≈ 0.7649 -->
    <!-- proj = 0.7649 * (340, -160) = (260.1, -122.4) → screen (260, 167.6) -->
    <line x1="200" y1="40" x2="260" y2="168" stroke="#4fc3f7" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.6"/>
    <circle cx="260" cy="168" r="5" fill="#e879f9" filter="url(#glow-pink)"/>

    <!-- Projection segment on b direction (pink/magenta) -->
    <line x1="0" y1="290" x2="260" y2="168" stroke="#e879f9" stroke-width="4" stroke-linecap="round" filter="url(#glow-pink)" opacity="0.85"/>

    <!-- Right angle marker at projection point -->
    <polyline points="248,176 256,184 264,176" fill="none" stroke="#e879f9" stroke-width="1.2" opacity="0.7"/>

    <!-- Projection label -->
    <text x="90" y="218" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold" fill="#e879f9">proj_b(a)</text>
    <text x="90" y="235" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#d4a4e8">= ‖a‖·cos θ</text>

    <!-- Angle arc between a and b -->
    <!-- b direction angle ≈ -25.2° from horizontal -->
    <!-- a direction angle ≈ -51.3° from horizontal -->
    <path d="M 55 265 A 40 40 0 0 1 35 248" fill="none" stroke="#ffd54f" stroke-width="1.8" stroke-dasharray="4,3"/>
    <text x="58" y="258" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="bold" fill="#ffd54f">θ</text>

    <!-- Projection area (shaded) -->
    <polygon points="0,290 260,168 200,40" fill="url(#proj-area)" stroke="none"/>

    <!-- ‖a‖ label along vector a -->
    <text x="75" y="155" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7" transform="rotate(-51.3, 75, 155)">‖a‖</text>

    <!-- ‖b‖ label along vector b -->
    <text x="195" y="195" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#81c784" transform="rotate(-25.2, 195, 195)">‖b‖</text>
  </g>

  <!-- Formula box (right side) - starts at x=520, clear of diagram -->
  <rect x="520" y="65" width="185" height="200" rx="10" fill="#1a1d2e" stroke="#3a3f55" stroke-width="1.2"/>
  <text x="612" y="90" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">內積的定義</text>
  <line x1="535" y1="100" x2="690" y2="100" stroke="#3a3f55" stroke-width="0.5"/>

  <!-- Formula 1: algebraic -->
  <text x="612" y="125" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#aaa">代數定義：</text>
  <text x="612" y="147" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#4fc3f7">⟨a, b⟩ = Σ aᵢ · bᵢ</text>

  <!-- Formula 2: geometric -->
  <text x="612" y="175" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#aaa">幾何定義：</text>
  <text x="612" y="197" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#81c784">⟨a, b⟩ = ‖a‖·‖b‖·cos θ</text>

  <!-- Formula 3: projection meaning -->
  <text x="612" y="225" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#aaa">投影意義：</text>
  <text x="612" y="247" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#e879f9">⟨a, b⟩ = ‖b‖·(‖a‖cos θ)</text>

  <!-- Legend box -->
  <rect x="520" y="280" width="185" height="120" rx="8" fill="#1a1d2e" stroke="#3a3f55" stroke-width="1"/>
  <text x="612" y="302" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0">圖例</text>
  <line x1="535" y1="312" x2="690" y2="312" stroke="#3a3f55" stroke-width="0.5"/>

  <line x1="535" y1="330" x2="560" y2="330" stroke="#4fc3f7" stroke-width="2.5"/>
  <circle cx="560" cy="330" r="3" fill="#4fc3f7"/>
  <text x="568" y="334" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#4fc3f7">a（向量 a）</text>

  <line x1="535" y1="352" x2="560" y2="352" stroke="#81c784" stroke-width="2.5"/>
  <circle cx="560" cy="352" r="3" fill="#81c784"/>
  <text x="568" y="356" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#81c784">b（向量 b）</text>

  <line x1="535" y1="374" x2="560" y2="374" stroke="#e879f9" stroke-width="4" stroke-linecap="round"/>
  <text x="568" y="378" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#e879f9">a 在 b 上的投影</text>

  <line x1="535" y1="392" x2="560" y2="392" stroke="#ffd54f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="568" y="396" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#ffd54f">θ（夾角）</text>

  <!-- Key insight box at bottom -->
  <rect x="30" y="430" width="660" height="76" rx="8" fill="#0d1a2e" stroke="#4fc3f7" stroke-width="1" opacity="0.9"/>
  
  <text x="360" y="455" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" fill="#e0e0e0">
    <tspan font-weight="bold" fill="#4fc3f7">核心概念：</tspan>
    <tspan fill="#ccc">內積 = 向量 a 在向量 b 方向上的投影長度 × 向量 b 的長度</tspan>
  </text>
  <text x="360" y="478" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#aaa">
    當 θ = 0° 時，⟨a, b⟩ = ‖a‖·‖b‖（最大值）｜當 θ = 90° 時，⟨a, b⟩ = 0（正交）｜當 θ = 180° 時，⟨a, b⟩ = −‖a‖·‖b‖（最小值）
  </text>
  <text x="360" y="498" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#777">
    內積衡量兩個向量的「方向一致性」：正值 = 同方向，零 = 垂直，負值 = 反方向
  </text>
</svg>