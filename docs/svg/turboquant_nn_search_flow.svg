<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="flow-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#78909c" />
    </marker>
    <marker id="flow-arrow-gold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffd54f" />
    </marker>
    <filter id="flow-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="flow-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flow-highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6f00;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#ffd54f;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ff6f00;stop-opacity:0.15" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="880" height="480" fill="url(#flow-bg)" rx="8"/>

  <!-- 標題 -->
  <text x="440" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">TurboQuant 中的最近鄰搜尋步驟</text>
  <text x="440" y="55" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#78909c">黃色高亮區域為暴力最近鄰搜尋步驟</text>

  <!-- ===== TurboQuant_mse 流程 ===== -->
  <text x="440" y="85" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="bold" fill="#66bb6a">TurboQuant_mse（MSE 最佳化）</text>

  <!-- Step 1: 輸入 -->
  <rect x="30" y="100" width="100" height="50" rx="6" fill="#263238" stroke="#546e7a" stroke-width="1.2"/>
  <text x="80" y="122" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#e0e0e0">輸入</text>
  <text x="80" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#90a4ae">x ∈ Sᵈ⁻¹</text>

  <!-- 箭頭 1→2 -->
  <line x1="130" y1="125" x2="155" y2="125" stroke="#78909c" stroke-width="1.5" marker-end="url(#flow-arrow)"/>

  <!-- Step 2: 隨機旋轉 -->
  <rect x="155" y="100" width="120" height="50" rx="6" fill="#1b5e20" fill-opacity="0.3" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="215" y="122" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#66bb6a">隨機旋轉</text>
  <text x="215" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#a5d6a7">y = Π · x</text>

  <!-- 箭頭 2→3 -->
  <line x1="275" y1="125" x2="300" y2="125" stroke="#78909c" stroke-width="1.5" marker-end="url(#flow-arrow)"/>

  <!-- Step 3: 最近鄰搜尋 (高亮!) -->
  <rect x="295" y="95" width="170" height="60" rx="6" fill="url(#flow-highlight)" stroke="#ffd54f" stroke-width="2" filter="url(#flow-glow)"/>
  <text x="380" y="118" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffd54f">純量最近鄰搜尋</text>
  <text x="380" y="135" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#fff9c4">idxⱼ = argminₖ |yⱼ - cₖ|</text>
  <text x="380" y="148" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#ffcc80">每座標在 2ᵇ 個質心中搜尋</text>

  <!-- 箭頭 3→4 -->
  <line x1="465" y1="125" x2="490" y2="125" stroke="#78909c" stroke-width="1.5" marker-end="url(#flow-arrow)"/>

  <!-- Step 4: 查表反量化 -->
  <rect x="490" y="100" width="120" height="50" rx="6" fill="#263238" stroke="#546e7a" stroke-width="1.2"/>
  <text x="550" y="122" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#e0e0e0">查表反量化</text>
  <text x="550" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#90a4ae">ŷⱼ = c_idxⱼ</text>

  <!-- 箭頭 4→5 -->
  <line x1="610" y1="125" x2="635" y2="125" stroke="#78909c" stroke-width="1.5" marker-end="url(#flow-arrow)"/>

  <!-- Step 5: 反向旋轉 -->
  <rect x="635" y="100" width="120" height="50" rx="6" fill="#1b5e20" fill-opacity="0.3" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="695" y="122" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#66bb6a">反向旋轉</text>
  <text x="695" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#a5d6a7">x̃ = Πᵀ · ŷ</text>

  <!-- 箭頭 5→輸出 -->
  <line x1="755" y1="125" x2="780" y2="125" stroke="#78909c" stroke-width="1.5" marker-end="url(#flow-arrow)"/>

  <!-- 輸出 -->
  <rect x="780" y="100" width="70" height="50" rx="6" fill="#263238" stroke="#66bb6a" stroke-width="1.2"/>
  <text x="815" y="122" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#66bb6a">輸出</text>
  <text x="815" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#a5d6a7">x̃</text>

  <!-- ===== TurboQuant_prod 流程 ===== -->
  <text x="440" y="195" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="bold" fill="#42a5f5">TurboQuant_prod（內積最佳化）</text>

  <!-- Step 1: 輸入 -->
  <rect x="30" y="210" width="100" height="50" rx="6" fill="#263238" stroke="#546e7a" stroke-width="1.2"/>
  <text x="80" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#e0e0e0">輸入</text>
  <text x="80" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#90a4ae">x ∈ Sᵈ⁻¹</text>

  <!-- 箭頭 -->
  <line x1="130" y1="235" x2="155" y2="235" stroke="#78909c" stroke-width="1.5" marker-end="url(#flow-arrow)"/>

  <!-- Step 2: Quant_mse -->
  <rect x="155" y="210" width="130" height="50" rx="6" fill="#0d47a1" fill-opacity="0.3" stroke="#42a5f5" stroke-width="1.2"/>
  <text x="220" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#42a5f5">Quant_mse</text>
  <text x="220" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#90caf9">位元寬度 b-1</text>

  <!-- 箭頭 -->
  <line x1="285" y1="235" x2="310" y2="235" stroke="#78909c" stroke-width="1.5" marker-end="url(#flow-arrow)"/>

  <!-- Step 3: 計算殘差 -->
  <rect x="310" y="210" width="120" height="50" rx="6" fill="#263238" stroke="#546e7a" stroke-width="1.2"/>
  <text x="370" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#e0e0e0">計算殘差</text>
  <text x="370" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#90a4ae">r = x - x̃_mse</text>

  <!-- 箭頭 -->
  <line x1="430" y1="235" x2="455" y2="235" stroke="#78909c" stroke-width="1.5" marker-end="url(#flow-arrow)"/>

  <!-- Step 4: QJL (高亮!) -->
  <rect x="450" y="205" width="150" height="60" rx="6" fill="url(#flow-highlight)" stroke="#ffd54f" stroke-width="2" filter="url(#flow-glow)"/>
  <text x="525" y="228" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffd54f">QJL 量化</text>
  <text x="525" y="245" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#fff9c4">qjl = sign(S · r)</text>
  <text x="525" y="258" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#ffcc80">1 位元量化殘差</text>

  <!-- 箭頭 -->
  <line x1="600" y1="235" x2="625" y2="235" stroke="#78909c" stroke-width="1.5" marker-end="url(#flow-arrow)"/>

  <!-- Step 5: 輸出 -->
  <rect x="625" y="210" width="120" height="50" rx="6" fill="#263238" stroke="#42a5f5" stroke-width="1.2"/>
  <text x="685" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#42a5f5">組合輸出</text>
  <text x="685" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#90caf9">(idx, qjl, ‖r‖₂)</text>

  <!-- 箭頭 -->
  <line x1="745" y1="235" x2="770" y2="235" stroke="#78909c" stroke-width="1.5" marker-end="url(#flow-arrow)"/>

  <!-- 最終輸出 -->
  <rect x="770" y="210" width="80" height="50" rx="6" fill="#263238" stroke="#42a5f5" stroke-width="1.2"/>
  <text x="810" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#42a5f5">輸出</text>
  <text x="810" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#90caf9">x̃_prod</text>

  <!-- ===== 關鍵洞見區域 ===== -->
  <rect x="30" y="290" width="820" height="170" rx="8" fill="#1a1a2e" stroke="#546e7a" stroke-width="1" opacity="0.9"/>
  <text x="440" y="315" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffd54f">關鍵洞見：從高維碼本搜尋到純量查表</text>

  <!-- 傳統 VQ -->
  <rect x="50" y="330" width="240" height="115" rx="6" fill="#b71c1c" fill-opacity="0.15" stroke="#ef5350" stroke-width="1"/>
  <text x="170" y="352" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef5350">傳統 VQ 編碼</text>

  <text x="170" y="375" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e0e0e0">在 K = 2ᵇ 個高維碼字中</text>
  <text x="170" y="395" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e0e0e0">搜尋最近鄰：</text>

  <rect x="70" y="405" width="200" height="28" rx="4" fill="#b71c1c" fill-opacity="0.3" stroke="#ef5350" stroke-width="0.8"/>
  <text x="170" y="424" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#ef9a9a">argmin ‖x - cₖ‖₂</text>

  <text x="170" y="440" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ef9a9a">複雜度：O(K · d)，K 隨 b 指數增長</text>

  <!-- 箭頭 -->
  <text x="310" y="390" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="20" fill="#78909c">→</text>

  <!-- TurboQuant -->
  <rect x="330" y="330" width="240" height="115" rx="6" fill="#1b5e20" fill-opacity="0.15" stroke="#66bb6a" stroke-width="1"/>
  <text x="450" y="352" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#66bb6a">TurboQuant 編碼</text>

  <text x="450" y="375" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e0e0e0">隨機旋轉後，每座標</text>
  <text x="450" y="395" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e0e0e0">獨立在 2ᵇ 個質心中搜尋：</text>

  <rect x="350" y="405" width="200" height="28" rx="4" fill="#1b5e20" fill-opacity="0.3" stroke="#66bb6a" stroke-width="0.8"/>
  <text x="450" y="424" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#a5d6a7">argmin |yⱼ - cₖ|</text>

  <text x="450" y="440" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#a5d6a7">複雜度：O(d · 2ᵇ)，2ᵇ 很小！</text>

  <!-- 結論 -->
  <rect x="600" y="330" width="230" height="115" rx="6" fill="#1a237e" fill-opacity="0.3" stroke="#5c6bc0" stroke-width="1"/>
  <text x="715" y="352" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#7986cb">結果對比</text>

  <text x="715" y="378" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e0e0e0">PQ 索引時間 (d=1536)：</text>
  <text x="715" y="398" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#ef5350">239.75 秒</text>

  <text x="715" y="418" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e0e0e0">TurboQuant 索引時間：</text>
  <text x="715" y="438" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#66bb6a">0.0013 秒</text>

  <text x="715" y="455" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ffd54f">加速比 ≈ 184,423x</text>
</svg>