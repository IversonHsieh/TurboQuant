<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" />
  
  <!-- Definitions for arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#2c3e50">TurboQuant 核心運作流程</text>
  
  <!-- Step 1: Input -->
  <g filter="url(#shadow)">
    <rect x="30" y="100" width="140" height="80" rx="15" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" />
    <text x="100" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0d47a1">原始高維向量</text>
    <text x="100" y="165" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1976d2">High-dim Vectors</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="170" y1="140" x2="220" y2="140" stroke="#555" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Step 2: PolarQuant -->
  <g filter="url(#shadow)">
    <rect x="230" y="70" width="240" height="140" rx="15" fill="#fff3e0" stroke="#ff9800" stroke-width="2" />
    <text x="350" y="110" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#e65100">Step 1: PolarQuant</text>
    <line x1="250" y1="120" x2="450" y2="120" stroke="#ffb74d" stroke-width="1" />
    <text x="350" y="145" font-family="Segoe UI, Arial, sans-serif" font-size="14" text-anchor="middle" fill="#ef6c00">極座標轉換</text>
    <text x="350" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ef6c00">(Radius &amp; Angle)</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="470" y1="140" x2="520" y2="140" stroke="#555" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Step 3: QJL -->
  <g filter="url(#shadow)">
    <rect x="530" y="100" width="140" height="80" rx="15" fill="#f1f8e9" stroke="#4caf50" stroke-width="2" />
    <text x="600" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1b5e20">Step 2: QJL</text>
    <text x="600" y="165" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#388e3c">1-bit 誤差修正</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="670" y1="140" x2="710" y2="140" stroke="#555" stroke-width="3" marker-end="url(#arrowhead)" />
  
  <!-- Step 4: Output -->
  <g filter="url(#shadow)">
    <rect x="710" y="100" width="80" height="80" rx="15" fill="#fce4ec" stroke="#e91e63" stroke-width="2" />
    <text x="750" y="140" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#880e4f">壓縮</text>
    <text x="750" y="165" font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#880e4f">KV Cache</text>
  </g>
</svg>