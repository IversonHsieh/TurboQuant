<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">失真界限 vs 位元寬度比較圖</title>
  <desc id="desc">展示 Suboptimal、TurboQuant 和理論下界三種量化方法的失真隨位元寬度變化的比較圖</desc>
  
  <!-- 定義漸層和濾鏡 -->
  <defs>
    <!-- 背景漸層 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    
    <!-- 網格線漸層 -->
    <linearGradient id="gridGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#30363d;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#30363d;stop-opacity:0.1" />
    </linearGradient>
    
    <!-- 光暈濾鏡 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 陰影濾鏡 -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="550" fill="url(#bgGradient)"/>
  
  <!-- 標題區域 -->
  <rect x="0" y="0" width="900" height="60" fill="#161b22" opacity="0.5"/>
  <text x="450" y="25" text-anchor="middle" fill="#f0f6fc" font-size="20" font-family="'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif" font-weight="600">失真界限 vs 位元寬度比較</text>
  <text x="450" y="48" text-anchor="middle" fill="#8b949e" font-size="13" font-family="'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif">Suboptimal vs Near-Optimal 量化方法分析</text>
  
  <!-- 繪圖區域背景 -->
  <rect x="100" y="80" width="720" height="360" fill="#0d1117" stroke="#30363d" stroke-width="1" rx="4"/>
  
  <!-- 網格線（水平） -->
  <line x1="100" y1="440" x2="820" y2="440" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="100" y1="368" x2="820" y2="368" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="100" y1="296" x2="820" y2="296" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="100" y1="224" x2="820" y2="224" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="100" y1="152" x2="820" y2="152" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="100" y1="80" x2="820" y2="80" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  
  <!-- 網格線（垂直） -->
  <line x1="100" y1="80" x2="100" y2="440" stroke="#30363d" stroke-width="1"/>
  <line x1="220" y1="80" x2="220" y2="440" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="340" y1="80" x2="340" y2="440" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="460" y1="80" x2="460" y2="440" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="580" y1="80" x2="580" y2="440" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="700" y1="80" x2="700" y2="440" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="820" y1="80" x2="820" y2="440" stroke="#30363d" stroke-width="1"/>
  
  <!-- Near-Optimal 區域高亮 -->
  <rect x="100" y="80" width="720" height="75" fill="rgba(46, 160, 67, 0.08)" stroke="rgba(46, 160, 67, 0.3)" stroke-width="1"/>
  <text x="810" y="100" text-anchor="end" fill="#2ea043" font-size="11" font-family="Arial, sans-serif" font-style="italic">Near-Optimal 區域</text>
  
  <!-- 座標軸 -->
  <line x1="100" y1="440" x2="820" y2="440" stroke="#8b949e" stroke-width="2"/>
  <line x1="100" y1="440" x2="100" y2="80" stroke="#8b949e" stroke-width="2"/>
  
  <!-- 箭頭 -->
  <polygon points="820,440 810,435 810,445" fill="#8b949e"/>
  <polygon points="100,80 95,90 105,90" fill="#8b949e"/>
  
  <!-- X 軸刻度與標籤 -->
  <line x1="100" y1="440" x2="100" y2="448" stroke="#8b949e" stroke-width="2"/>
  <text x="100" y="468" text-anchor="middle" fill="#c9d1d9" font-size="13" font-family="Arial, sans-serif">1</text>
  
  <line x1="220" y1="440" x2="220" y2="448" stroke="#8b949e" stroke-width="2"/>
  <text x="220" y="468" text-anchor="middle" fill="#c9d1d9" font-size="13" font-family="Arial, sans-serif">2</text>
  
  <line x1="340" y1="440" x2="340" y2="448" stroke="#8b949e" stroke-width="2"/>
  <text x="340" y="468" text-anchor="middle" fill="#c9d1d9" font-size="13" font-family="Arial, sans-serif">3</text>
  
  <line x1="460" y1="440" x2="460" y2="448" stroke="#8b949e" stroke-width="2"/>
  <text x="460" y="468" text-anchor="middle" fill="#c9d1d9" font-size="13" font-family="Arial, sans-serif">4</text>
  
  <line x1="580" y1="440" x2="580" y2="448" stroke="#8b949e" stroke-width="2"/>
  <text x="580" y="468" text-anchor="middle" fill="#c9d1d9" font-size="13" font-family="Arial, sans-serif">5</text>
  
  <line x1="700" y1="440" x2="700" y2="448" stroke="#8b949e" stroke-width="2"/>
  <text x="700" y="468" text-anchor="middle" fill="#c9d1d9" font-size="13" font-family="Arial, sans-serif">6</text>
  
  <line x1="820" y1="440" x2="820" y2="448" stroke="#8b949e" stroke-width="2"/>
  <text x="820" y="468" text-anchor="middle" fill="#c9d1d9" font-size="13" font-family="Arial, sans-serif">8</text>
  
  <!-- X 軸標題 -->
  <text x="460" y="500" text-anchor="middle" fill="#f0f6fc" font-size="15" font-family="'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif" font-weight="500">位元寬度 (b)</text>
  
  <!-- Y 軸刻度與標籤 -->
  <line x1="100" y1="440" x2="92" y2="440" stroke="#8b949e" stroke-width="2"/>
  <text x="85" y="445" text-anchor="end" fill="#c9d1d9" font-size="12" font-family="Arial, sans-serif">10⁰</text>
  
  <line x1="100" y1="368" x2="92" y2="368" stroke="#8b949e" stroke-width="2"/>
  <text x="85" y="373" text-anchor="end" fill="#c9d1d9" font-size="12" font-family="Arial, sans-serif">10⁻¹</text>
  
  <line x1="100" y1="296" x2="92" y2="296" stroke="#8b949e" stroke-width="2"/>
  <text x="85" y="301" text-anchor="end" fill="#c9d1d9" font-size="12" font-family="Arial, sans-serif">10⁻²</text>
  
  <line x1="100" y1="224" x2="92" y2="224" stroke="#8b949e" stroke-width="2"/>
  <text x="85" y="229" text-anchor="end" fill="#c9d1d9" font-size="12" font-family="Arial, sans-serif">10⁻³</text>
  
  <line x1="100" y1="152" x2="92" y2="152" stroke="#8b949e" stroke-width="2"/>
  <text x="85" y="157" text-anchor="end" fill="#c9d1d9" font-size="12" font-family="Arial, sans-serif">10⁻⁴</text>
  
  <!-- Y 軸標題 -->
  <text x="35" y="260" text-anchor="middle" fill="#f0f6fc" font-size="15" font-family="'Segoe UI', 'Microsoft JhengHei', Arial, sans-serif" font-weight="500" transform="rotate(-90, 35, 260)">MSE 失真 (log 尺度)</text>
  
  <!-- 數據曲線 -->
  
  <!-- Suboptimal PQ 曲線 (d/4^b, d=1536) - 紅色 -->
  <path d="M 100,475 
           L 220,458 
           L 340,415 
           L 460,340 
           L 580,250 
           L 700,165 
           L 820,95" 
        stroke="#ff6b6b" stroke-width="3.5" fill="none" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Suboptimal 數據點 -->
  <circle cx="100" cy="475" r="5" fill="#ff6b6b" stroke="#0d1117" stroke-width="2"/>
  <circle cx="220" cy="458" r="5" fill="#ff6b6b" stroke="#0d1117" stroke-width="2"/>
  <circle cx="340" cy="415" r="5" fill="#ff6b6b" stroke="#0d1117" stroke-width="2"/>
  <circle cx="460" cy="340" r="5" fill="#ff6b6b" stroke="#0d1117" stroke-width="2"/>
  <circle cx="580" cy="250" r="5" fill="#ff6b6b" stroke="#0d1117" stroke-width="2"/>
  <circle cx="700" cy="165" r="5" fill="#ff6b6b" stroke="#0d1117" stroke-width="2"/>
  <circle cx="820" cy="95" r="5" fill="#ff6b6b" stroke="#0d1117" stroke-width="2"/>
  
  <!-- TurboQuant 曲線 (3π/2 · 1/4^b) - 藍色 -->
  <path d="M 100,428 
           L 220,358 
           L 340,288 
           L 460,218 
           L 580,148 
           L 700,85 
           L 820,85" 
        stroke="#58a6ff" stroke-width="3.5" fill="none" filter="url(#glow)" opacity="0.9"/>
  
  <!-- TurboQuant 數據點 -->
  <circle cx="100" cy="428" r="5" fill="#58a6ff" stroke="#0d1117" stroke-width="2"/>
  <circle cx="220" cy="358" r="5" fill="#58a6ff" stroke="#0d1117" stroke-width="2"/>
  <circle cx="340" cy="288" r="5" fill="#58a6ff" stroke="#0d1117" stroke-width="2"/>
  <circle cx="460" cy="218" r="5" fill="#58a6ff" stroke="#0d1117" stroke-width="2"/>
  <circle cx="580" cy="148" r="5" fill="#58a6ff" stroke="#0d1117" stroke-width="2"/>
  <circle cx="700" cy="85" r="5" fill="#58a6ff" stroke="#0d1117" stroke-width="2"/>
  <circle cx="820" cy="85" r="5" fill="#58a6ff" stroke="#0d1117" stroke-width="2"/>
  
  <!-- 理論下界曲線 (1/4^b) - 綠色虛線 -->
  <path d="M 100,440 
           L 220,368 
           L 340,296 
           L 460,224 
           L 580,152 
           L 700,80 
           L 820,80" 
        stroke="#2ea043" stroke-width="3" fill="none" stroke-dasharray="8,4" opacity="0.8"/>
  
  <!-- 下界數據點 -->
  <circle cx="100" cy="440" r="4" fill="#2ea043" stroke="#0d1117" stroke-width="2"/>
  <circle cx="220" cy="368" r="4" fill="#2ea043" stroke="#0d1117" stroke-width="2"/>
  <circle cx="340" cy="296" r="4" fill="#2ea043" stroke="#0d1117" stroke-width="2"/>
  <circle cx="460" cy="224" r="4" fill="#2ea043" stroke="#0d1117" stroke-width="2"/>
  <circle cx="580" cy="152" r="4" fill="#2ea043" stroke="#0d1117" stroke-width="2"/>
  <circle cx="700" cy="80" r="4" fill="#2ea043" stroke="#0d1117" stroke-width="2"/>
  <circle cx="820" cy="80" r="4" fill="#2ea043" stroke="#0d1117" stroke-width="2"/>
  
  <!-- 圖例區域 -->
  <rect x="550" y="485" width="330" height="55" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6" filter="url(#shadow)"/>
  
  <!-- 圖例項目 1 -->
  <line x1="565" y1="505" x2="595" y2="505" stroke="#2ea043" stroke-width="3" stroke-dasharray="8,4"/>
  <circle cx="580" cy="505" r="4" fill="#2ea043"/>
  <text x="605" y="510" fill="#c9d1d9" font-size="13" font-family="Arial, sans-serif">理論下界 (1/4ᵇ)</text>
  
  <!-- 圖例項目 2 -->
  <line x1="565" y1="525" x2="595" y2="525" stroke="#58a6ff" stroke-width="3.5"/>
  <circle cx="580" cy="525" r="5" fill="#58a6ff"/>
  <text x="605" y="530" fill="#c9d1d9" font-size="13" font-family="Arial, sans-serif">TurboQuant (3π/2 · 1/4ᵇ)</text>
  
  <!-- 圖例項目 3 -->
  <line x1="720" y1="505" x2="750" y2="505" stroke="#ff6b6b" stroke-width="3.5"/>
  <circle cx="735" cy="505" r="5" fill="#ff6b6b"/>
  <text x="760" y="510" fill="#c9d1d9" font-size="13" font-family="Arial, sans-serif">Suboptimal PQ (d/4ᵇ)</text>
  
  <!-- 註釋框 -->
  <rect x="110" y="90" width="280" height="55" fill="rgba(255,107,107,0.1)" stroke="#ff6b6b" stroke-width="1" rx="4"/>
  <text x="120" y="110" fill="#ff6b6b" font-size="11" font-family="Arial, sans-serif" font-weight="600">⚠ Suboptimal 方法</text>
  <text x="120" y="128" fill="#ff6b6b" font-size="11" font-family="Arial, sans-serif">失真隨維度 d 線性增長</text>
  <text x="120" y="142" fill="#ff6b6b" font-size="11" font-family="Arial, sans-serif">需要更多位元達到相同品質</text>
  
  <!-- 間距指示器 -->
  <line x1="850" y1="200" x2="850" y2="350" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="850,200 845,210 855,210" fill="#8b949e"/>
  <polygon points="850,350 845,340 855,340" fill="#8b949e"/>
  <text x="860" y="275" fill="#8b949e" font-size="11" font-family="Arial, sans-serif" transform="rotate(90, 860, 275)">性能差距</text>
  
  <!-- 底部說明 -->
  <text x="450" y="535" text-anchor="middle" fill="#8b949e" font-size="11" font-family="Arial, sans-serif">圖表顯示：TurboQuant 與理論下界僅相差常數因子 ≈2.7，而 Suboptimal 方法差距為 O(d)</text>
</svg>
