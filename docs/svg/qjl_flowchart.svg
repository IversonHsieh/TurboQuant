<svg width="600" height="260" viewBox="0 0 600 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="260" fill="#181C20"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#fff">
    <!-- Step 1: 原始向量 -->
    <rect x="30" y="90" width="110" height="40" rx="10" fill="#2D3748"/>
    <text x="85" y="115" text-anchor="middle" alignment-baseline="middle">原始向量</text>
    <!-- Arrow 1 -->
    <line x1="140" y1="110" x2="180" y2="110" stroke="#fff" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- Step 2: 隨機旋轉 -->
    <rect x="180" y="90" width="110" height="40" rx="10" fill="#2B6CB0"/>
    <text x="235" y="115" text-anchor="middle" alignment-baseline="middle">隨機旋轉</text>
    <!-- Arrow 2 -->
    <line x1="290" y1="110" x2="330" y2="110" stroke="#fff" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- Step 3: Lloyd-Max 量化 -->
    <rect x="330" y="90" width="120" height="40" rx="10" fill="#38A169"/>
    <text x="390" y="115" text-anchor="middle" alignment-baseline="middle">Lloyd-Max 量化</text>
    <!-- Arrow 3 -->
    <line x1="450" y1="110" x2="490" y2="110" stroke="#fff" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- Step 4: 殘差計算 -->
    <rect x="490" y="90" width="80" height="40" rx="10" fill="#D69E2E"/>
    <text x="530" y="115" text-anchor="middle" alignment-baseline="middle">殘差</text>
    <!-- Arrow 4 (down) -->
    <line x1="530" y1="130" x2="530" y2="170" stroke="#fff" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- Step 5: QJL 1-bit 量化 -->
    <rect x="440" y="170" width="180" height="40" rx="10" fill="#DD6B20"/>
    <text x="530" y="195" text-anchor="middle" alignment-baseline="middle">QJL 1-bit 量化</text>
    <!-- Arrow 5 (left) -->
    <line x1="440" y1="190" x2="120" y2="190" stroke="#fff" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- Step 6: 壓縮結果 -->
    <rect x="30" y="170" width="110" height="40" rx="10" fill="#805AD5"/>
    <text x="85" y="195" text-anchor="middle" alignment-baseline="middle">壓縮結果</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L3,5 Z" fill="#fff" />
    </marker>
  </defs>
</svg>
