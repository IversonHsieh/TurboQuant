<svg width="700" height="280" viewBox="0 0 700 280" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#181c20"/>
  
  <!-- 定義箭頭 -->
  <defs>
    <marker id="axis-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#bbb" />
    </marker>
    <marker id="x-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4fc3f7" />
    </marker>
    <marker id="xhat-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffb74d" />
    </marker>
    <marker id="q-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#81c784" />
    </marker>
  </defs>
  
  <!-- 標題 -->
  <text x="350" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0" text-anchor="middle">內積誤差的幾何意義 (Inner Product Errors)</text>
  
  <!-- 左圖：原始內積 -->
  <g transform="translate(30, 50)">
    <text x="100" y="-10" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0">(a) 原始內積</text>
    
    <!-- 座標軸 -->
    <line x1="0" y1="180" x2="200" y2="180" stroke="#bbb" stroke-width="2" marker-end="url(#axis-arrow)"/>
    <line x1="0" y1="180" x2="0" y2="0" stroke="#bbb" stroke-width="2" marker-end="url(#axis-arrow)"/>
    <text x="205" y="185" font-family="sans-serif" font-size="11" fill="#bbb">x</text>
    <text x="-5" y="-5" font-family="sans-serif" font-size="11" fill="#bbb">y</text>
    
    <!-- 查詢向量 q -->
    <line x1="0" y1="180" x2="160" y2="90" stroke="#81c784" stroke-width="2.5" marker-end="url(#q-arrow)"/>
    <text x="165" y="85" font-family="sans-serif" font-size="13" fill="#81c784" font-weight="bold">q</text>
    
    <!-- 原始向量 x -->
    <line x1="0" y1="180" x2="130" y2="50" stroke="#4fc3f7" stroke-width="2.5" marker-end="url(#x-arrow)"/>
    <text x="135" y="45" font-family="sans-serif" font-size="13" fill="#4fc3f7" font-weight="bold">x</text>
    
    <!-- 投影線 -->
    <line x1="130" y1="50" x2="100" y2="105" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="100" cy="105" r="3.5" fill="#81c784"/>
    
    <!-- 投影長度標示 -->
    <line x1="0" y1="180" x2="100" y2="105" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <text x="45" y="155" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">⟨q,x⟩</text>
    
    <!-- 角度弧 -->
    <path d="M 35 160 A 30 30 0 0 1 50 145" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="55" y="150" font-family="sans-serif" font-size="10" fill="#fff">θ</text>
    
    <!-- 圓點 -->
    <circle cx="160" cy="90" r="3.5" fill="#81c784"/>
    <circle cx="130" cy="50" r="3.5" fill="#4fc3f7"/>
  </g>
  
  <!-- 中圖：量化後內積 -->
  <g transform="translate(250, 50)">
    <text x="100" y="-10" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0">(b) 量化後內積</text>
    
    <!-- 座標軸 -->
    <line x1="0" y1="180" x2="200" y2="180" stroke="#bbb" stroke-width="2" marker-end="url(#axis-arrow)"/>
    <line x1="0" y1="180" x2="0" y2="0" stroke="#bbb" stroke-width="2" marker-end="url(#axis-arrow)"/>
    
    <!-- 查詢向量 q (保持不變) -->
    <line x1="0" y1="180" x2="160" y2="90" stroke="#81c784" stroke-width="2.5" marker-end="url(#q-arrow)"/>
    <text x="165" y="85" font-family="sans-serif" font-size="13" fill="#81c784" font-weight="bold">q</text>
    
    <!-- 量化後向量 x̂ -->
    <line x1="0" y1="180" x2="115" y2="70" stroke="#ffb74d" stroke-width="2.5" marker-end="url(#xhat-arrow)"/>
    <text x="120" y="65" font-family="sans-serif" font-size="13" fill="#ffb74d" font-weight="bold">x̂</text>
    
    <!-- 原始向量 x (淡色參考) -->
    <line x1="0" y1="180" x2="130" y2="50" stroke="#4fc3f7" stroke-width="2" stroke-opacity="0.3" marker-end="url(#x-arrow)"/>
    
    <!-- 投影線 -->
    <line x1="115" y1="70" x2="95" y2="115" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="95" cy="115" r="3.5" fill="#81c784"/>
    
    <!-- 投影長度標示 -->
    <line x1="0" y1="180" x2="95" y2="115" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <text x="40" y="160" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">⟨q,x̂⟩</text>
    
    <!-- 圓點 -->
    <circle cx="160" cy="90" r="3.5" fill="#81c784"/>
    <circle cx="115" cy="70" r="3.5" fill="#ffb74d"/>
  </g>
  
  <!-- 右圖：內積誤差 -->
  <g transform="translate(470, 50)">
    <text x="100" y="-10" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0">(c) 內積誤差</text>
    
    <!-- 座標軸 -->
    <line x1="0" y1="180" x2="200" y2="180" stroke="#bbb" stroke-width="2" marker-end="url(#axis-arrow)"/>
    <line x1="0" y1="180" x2="0" y2="0" stroke="#bbb" stroke-width="2" marker-end="url(#axis-arrow)"/>
    
    <!-- 查詢向量 q (淡色) -->
    <line x1="0" y1="180" x2="160" y2="90" stroke="#81c784" stroke-width="2" stroke-opacity="0.4" marker-end="url(#q-arrow)"/>
    
    <!-- 原始投影長度 -->
    <line x1="0" y1="180" x2="100" y2="105" stroke="#4fc3f7" stroke-width="4" stroke-linecap="round"/>
    <text x="40" y="150" font-family="sans-serif" font-size="11" fill="#4fc3f7" font-weight="bold">⟨q,x⟩</text>
    
    <!-- 量化後投影長度 -->
    <line x1="0" y1="180" x2="95" y2="115" stroke="#ffb74d" stroke-width="4" stroke-linecap="round"/>
    <text x="35" y="165" font-family="sans-serif" font-size="11" fill="#ffb74d" font-weight="bold">⟨q,x̂⟩</text>
    
    <!-- 誤差區域 -->
    <line x1="95" y1="115" x2="100" y2="105" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <circle cx="95" cy="115" r="4.5" fill="#fff"/>
    <circle cx="100" cy="105" r="4.5" fill="#fff"/>
    
    <!-- 誤差標示 -->
    <text x="55" y="135" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">誤差 = |⟨q,x⟩-⟨q,x̂⟩|</text>
  </g>
  
  <!-- 底部說明 -->
  <rect x="140" y="235" width="420" height="35" fill="#23272e" stroke="#444" stroke-width="1" rx="6"/>
  <text x="350" y="258" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#bdbdbd">
    內積 = 向量在 q 方向上的投影長度 × |q|  |  內積誤差 = 投影長度的差異
  </text>
  
  <!-- 圖例 -->
  <rect x="20" y="235" width="110" height="35" fill="#23272e" stroke="#444" stroke-width="1" rx="6"/>
  <line x1="30" y1="250" x2="50" y2="250" stroke="#4fc3f7" stroke-width="2.5"/>
  <text x="55" y="254" font-family="sans-serif" font-size="11" fill="#bdbdbd">x</text>
  <line x1="75" y1="250" x2="95" y2="250" stroke="#ffb74d" stroke-width="2.5"/>
  <text x="100" y="254" font-family="sans-serif" font-size="11" fill="#bdbdbd">x̂</text>
  <line x1="30" y1="265" x2="50" y2="265" stroke="#81c784" stroke-width="2.5"/>
  <text x="55" y="269" font-family="sans-serif" font-size="11" fill="#bdbdbd">q</text>
</svg>
