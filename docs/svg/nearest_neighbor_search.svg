<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- 背景 -->
  <rect width="800" height="600" fill="#1a1a2e"/>
  
  <!-- 標題 -->
  <text x="400" y="40" text-anchor="middle" font-size="24" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold">最近鄰搜尋 (Nearest Neighbor Search) 示意圖</text>
  
  <!-- 座標軸 -->
  <line x1="100" y1="500" x2="700" y2="500" stroke="#4a4a6a" stroke-width="2"/>
  <line x1="100" y1="500" x2="100" y2="100" stroke="#4a4a6a" stroke-width="2"/>
  
  <!-- X 軸標籤 -->
  <text x="700" y="520" text-anchor="end" font-size="14" fill="#8888aa" font-family="Arial, sans-serif">x (維度 1)</text>
  <!-- Y 軸標籤 -->
  <text x="80" y="100" text-anchor="end" font-size="14" fill="#8888aa" font-family="Arial, sans-serif">y (維度 2)</text>
  
  <!-- 數據點 - 類別 1 (紅色) -->
  <circle cx="200" cy="200" r="12" fill="#ff6b6b" opacity="0.8"/>
  <text x="200" y="185" text-anchor="middle" font-size="12" fill="#ff6b6b" font-family="Arial, sans-serif" font-weight="bold">A</text>
  
  <circle cx="280" cy="180" r="12" fill="#ff6b6b" opacity="0.8"/>
  <text x="280" y="165" text-anchor="middle" font-size="12" fill="#ff6b6b" font-family="Arial, sans-serif" font-weight="bold">B</text>
  
  <!-- 數據點 - 類別 2 (藍色) -->
  <circle cx="400" cy="250" r="12" fill="#4ecdc4" opacity="0.8"/>
  <text x="400" y="235" text-anchor="middle" font-size="12" fill="#4ecdc4" font-family="Arial, sans-serif" font-weight="bold">C</text>
  
  <circle cx="500" cy="220" r="12" fill="#4ecdc4" opacity="0.8"/>
  <text x="500" y="205" text-anchor="middle" font-size="12" fill="#4ecdc4" font-family="Arial, sans-serif" font-weight="bold">D</text>
  
  <!-- 數據點 - 類別 3 (綠色) -->
  <circle cx="550" cy="350" r="12" fill="#95e1a3" opacity="0.8"/>
  <text x="550" y="335" text-anchor="middle" font-size="12" fill="#95e1a3" font-family="Arial, sans-serif" font-weight="bold">E</text>
  
  <circle cx="450" cy="400" r="12" fill="#95e1a3" opacity="0.8"/>
  <text x="450" y="385" text-anchor="middle" font-size="12" fill="#95e1a3" font-family="Arial, sans-serif" font-weight="bold">F</text>
  
  <!-- 查詢點 (黃色，帶閃耀效果) -->
  <circle cx="320" cy="280" r="20" fill="#f9e79f" opacity="0.3">
    <animate attributeName="r" values="18;22;18" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.2;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="280" r="15" fill="#f1c40f" stroke="#ffffff" stroke-width="2"/>
  <text x="320" y="260" text-anchor="middle" font-size="14" fill="#f1c40f" font-family="Arial, sans-serif" font-weight="bold">查詢點 q</text>
  
  <!-- 到最近鄰的連線 (虛線，高亮) -->
  <line x1="320" y1="280" x2="280" y2="180" stroke="#f1c40f" stroke-width="3" stroke-dasharray="5,5" opacity="0.8">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1s" repeatCount="indefinite"/>
  </line>
  
  <!-- 到其他點的連線 (細線，低透明度) -->
  <line x1="320" y1="280" x2="200" y2="200" stroke="#666666" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="320" y1="280" x2="400" y2="250" stroke="#666666" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="320" y1="280" x2="500" y2="220" stroke="#666666" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="320" y1="280" x2="550" y2="350" stroke="#666666" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="320" y1="280" x2="450" y2="400" stroke="#666666" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  
  <!-- 距離標籤 -->
  <text x="310" y="235" font-size="11" fill="#f1c40f" font-family="Arial, sans-serif" font-weight="bold">dist = 107.7 (最近)</text>
  <text x="240" y="250" font-size="10" fill="#888888" font-family="Arial, sans-serif">dist ≈ 144</text>
  <text x="370" y="270" font-size="10" fill="#888888" font-family="Arial, sans-serif">dist ≈ 82.5</text>
  
  <!-- 圖例 -->
  <rect x="580" y="100" width="180" height="140" fill="#2a2a3e" stroke="#4a4a6a" stroke-width="1" rx="5"/>
  <text x="670" y="125" text-anchor="middle" font-size="14" fill="#ffffff" font-family="Arial, sans-serif" font-weight="bold">圖例</text>
  
  <!-- 圖例項目 -->
  <circle cx="600" cy="150" r="8" fill="#ff6b6b" opacity="0.8"/>
  <text x="620" y="155" font-size="12" fill="#cccccc" font-family="Arial, sans-serif">類別 1</text>
  
  <circle cx="680" cy="150" r="8" fill="#4ecdc4" opacity="0.8"/>
  <text x="700" y="155" font-size="12" fill="#cccccc" font-family="Arial, sans-serif">類別 2</text>
  
  <circle cx="600" cy="180" r="8" fill="#95e1a3" opacity="0.8"/>
  <text x="620" y="185" font-size="12" fill="#cccccc" font-family="Arial, sans-serif">類別 3</text>
  
  <circle cx="600" cy="210" r="10" fill="#f1c40f" stroke="#ffffff" stroke-width="2"/>
  <text x="620" y="215" font-size="12" fill="#cccccc" font-family="Arial, sans-serif">查詢點</text>
  
  <line x1="595" y1="235" x2="615" y2="235" stroke="#f1c40f" stroke-width="3" stroke-dasharray="5,5"/>
  <text x="620" y="240" font-size="12" fill="#cccccc" font-family="Arial, sans-serif">最近鄰連線</text>
  
  <!-- 公式區域 -->
  <rect x="100" y="530" width="600" height="60" fill="#2a2a3e" stroke="#4a4a6a" stroke-width="1" rx="5"/>
  <text x="400" y="555" text-anchor="middle" font-size="16" fill="#ffffff" font-family="Arial, sans-serif">
    <tspan x="400" dy="0">最近鄰搜尋公式：</tspan>
    <tspan x="400" dy="20" font-style="italic">x* = arg min dist(q, xᵢ)</tspan>
  </text>
  
  <!-- 說明文字 -->
  <text x="400" y="590" text-anchor="middle" font-size="11" fill="#666688" font-family="Arial, sans-serif">
    查詢點 q 在二維空間中尋找最近的數據點 B（紅色類別）
  </text>
</svg>
