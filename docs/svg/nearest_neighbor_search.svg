<svg width="800" height="560" viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="nn-axis-arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#78909c" />
    </marker>
    <filter id="nn-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nn-glow-strong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="nn-bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="nn-query-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd54f;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffd54f;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="560" fill="url(#nn-bg-grad)" rx="8"/>

  <!-- 標題 -->
  <text x="400" y="38" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="bold" fill="#e0e0e0">Brute-Force Nearest Neighbor Search</text>
  <text x="400" y="58" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#78909c">暴力法最近鄰搜尋示意圖</text>

  <!-- 座標軸 -->
  <line x1="120" y1="440" x2="720" y2="440" stroke="#78909c" stroke-width="1.5" marker-end="url(#nn-axis-arrow)"/>
  <line x1="120" y1="440" x2="120" y2="80" stroke="#78909c" stroke-width="1.5" marker-end="url(#nn-axis-arrow)"/>
  <text x="730" y="455" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#78909c">x₁</text>
  <text x="105" y="75" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#78909c">x₂</text>

  <!-- 網格線 -->
  <g stroke="#263238" stroke-width="0.5" stroke-dasharray="4,4">
    <line x1="220" y1="440" x2="220" y2="85"/>
    <line x1="320" y1="440" x2="320" y2="85"/>
    <line x1="420" y1="440" x2="420" y2="85"/>
    <line x1="520" y1="440" x2="520" y2="85"/>
    <line x1="620" y1="440" x2="620" y2="85"/>
    <line x1="120" y1="360" x2="720" y2="360"/>
    <line x1="120" y1="280" x2="720" y2="280"/>
    <line x1="120" y1="200" x2="720" y2="200"/>
    <line x1="120" y1="120" x2="720" y2="120"/>
  </g>

  <!-- 座標刻度 -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#546e7a">
    <text x="220" y="458" text-anchor="middle">1</text>
    <text x="320" y="458" text-anchor="middle">2</text>
    <text x="420" y="458" text-anchor="middle">3</text>
    <text x="520" y="458" text-anchor="middle">4</text>
    <text x="620" y="458" text-anchor="middle">5</text>
    <text x="108" y="364" text-anchor="end">1</text>
    <text x="108" y="284" text-anchor="end">2</text>
    <text x="108" y="204" text-anchor="end">3</text>
    <text x="108" y="124" text-anchor="end">4</text>
  </g>

  <!-- 到最近鄰的連線 (高亮黃色) -->
  <line x1="320" y1="280" x2="220" y2="200" stroke="#ffd54f" stroke-width="2.5" stroke-dasharray="6,3" filter="url(#nn-glow)"/>
  <line x1="320" y1="280" x2="320" y2="360" stroke="#ffd54f" stroke-width="2.5" stroke-dasharray="6,3" filter="url(#nn-glow)"/>

  <!-- 到其他點的連線 (灰色) -->
  <line x1="320" y1="280" x2="520" y2="120" stroke="#455a64" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
  <line x1="320" y1="280" x2="620" y2="200" stroke="#455a64" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>

  <!-- 距離標籤 -->
  <!-- dist(q, x₁) = 1 -->
  <rect x="238" y="222" width="72" height="22" rx="4" fill="#1a237e" fill-opacity="0.8" stroke="#5c6bc0" stroke-width="0.5"/>
  <text x="274" y="238" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffd54f">dist = 1</text>

  <!-- dist(q, x₃) = 1 -->
  <rect x="338" y="308" width="72" height="22" rx="4" fill="#1a237e" fill-opacity="0.8" stroke="#5c6bc0" stroke-width="0.5"/>
  <text x="374" y="324" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffd54f">dist = 1</text>

  <!-- dist(q, x₂) ≈ 3.61 -->
  <rect x="398" y="188" width="90" height="22" rx="4" fill="#263238" fill-opacity="0.8" stroke="#455a64" stroke-width="0.5"/>
  <text x="443" y="204" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#90a4ae">dist ≈ 3.61</text>

  <!-- dist(q, x₄) ≈ 3.16 -->
  <rect x="458" y="238" width="90" height="22" rx="4" fill="#263238" fill-opacity="0.8" stroke="#455a64" stroke-width="0.5"/>
  <text x="503" y="254" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#90a4ae">dist ≈ 3.16</text>

  <!-- 數據點 x₁ = (1, 2) -->
  <circle cx="220" cy="200" r="10" fill="#42a5f5" stroke="#90caf9" stroke-width="2" filter="url(#nn-glow)"/>
  <text x="220" y="183" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#90caf9">x₁</text>
  <text x="220" y="170" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#546e7a">(1, 2)</text>

  <!-- 數據點 x₂ = (4, 5) -->
  <circle cx="520" cy="120" r="10" fill="#42a5f5" stroke="#90caf9" stroke-width="2" filter="url(#nn-glow)"/>
  <text x="520" y="103" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#90caf9">x₂</text>
  <text x="520" y="90" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#546e7a">(4, 5)</text>

  <!-- 數據點 x₃ = (2, 1) -->
  <circle cx="320" cy="360" r="10" fill="#42a5f5" stroke="#90caf9" stroke-width="2" filter="url(#nn-glow)"/>
  <text x="320" y="383" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#90caf9">x₃</text>
  <text x="320" y="396" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#546e7a">(2, 1)</text>

  <!-- 數據點 x₄ = (5, 3) -->
  <circle cx="620" cy="200" r="10" fill="#42a5f5" stroke="#90caf9" stroke-width="2" filter="url(#nn-glow)"/>
  <text x="620" y="183" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="bold" fill="#90caf9">x₄</text>
  <text x="620" y="170" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#546e7a">(5, 3)</text>

  <!-- 查詢點 q = (2, 2) -->
  <circle cx="320" cy="280" r="22" fill="url(#nn-query-glow)"/>
  <circle cx="320" cy="280" r="13" fill="#ffd54f" stroke="#fff176" stroke-width="2.5" filter="url(#nn-glow-strong)"/>
  <text x="320" y="263" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffd54f">q</text>
  <text x="345" y="275" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#546e7a">(2, 2)</text>

  <!-- 公式區域 -->
  <rect x="120" y="475" width="600" height="70" rx="6" fill="#1a237e" fill-opacity="0.3" stroke="#5c6bc0" stroke-width="1"/>
  <text x="420" y="500" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="bold" fill="#e0e0e0">
    最近鄰搜尋：i* = arg min dist(q, xᵢ)
  </text>
  <text x="420" y="525" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#90a4ae">
    結果：x₁ 和 x₃ 為最近鄰（dist = 1），黃色虛線標示最近鄰連線
  </text>

  <!-- 圖例 -->
  <rect x="580" y="80" width="140" height="100" rx="6" fill="#1a237e" fill-opacity="0.4" stroke="#5c6bc0" stroke-width="0.8"/>
  <text x="650" y="100" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e0e0e0">圖例</text>
  <circle cx="600" cy="120" r="6" fill="#42a5f5" stroke="#90caf9" stroke-width="1.5"/>
  <text x="615" y="124" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#b0bec5">資料點</text>
  <circle cx="600" cy="142" r="6" fill="#ffd54f" stroke="#fff176" stroke-width="1.5"/>
  <text x="615" y="146" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#b0bec5">查詢點</text>
  <line x1="593" y1="162" x2="607" y2="162" stroke="#ffd54f" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="615" y="166" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#b0bec5">最近鄰</text>
</svg>
