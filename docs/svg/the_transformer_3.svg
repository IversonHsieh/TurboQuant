<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#555" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" fill="#ffffff" rx="8" />

  <!-- Input Sequence Label -->
  <text x="80" y="100" font-family="sans-serif" font-size="15" fill="#444" font-weight="600" text-anchor="middle">Inputs</text>

  <!-- Input Token Boxes -->
  <rect x="20" y="115" width="55" height="38" rx="6" fill="#d4e8f5" stroke="#7baac7" stroke-width="1.2" />
  <text x="47" y="139" font-family="sans-serif" font-size="13" fill="#2c3e50" text-anchor="middle" font-weight="500">I</text>

  <rect x="85" y="115" width="55" height="38" rx="6" fill="#d4e8f5" stroke="#7baac7" stroke-width="1.2" />
  <text x="112" y="139" font-family="sans-serif" font-size="13" fill="#2c3e50" text-anchor="middle" font-weight="500">am</text>

  <rect x="150" y="115" width="55" height="38" rx="6" fill="#d4e8f5" stroke="#7baac7" stroke-width="1.2" />
  <text x="177" y="139" font-family="sans-serif" font-size="13" fill="#2c3e50" text-anchor="middle" font-weight="500">a</text>

  <rect x="215" y="115" width="70" height="38" rx="6" fill="#d4e8f5" stroke="#7baac7" stroke-width="1.2" />
  <text x="250" y="139" font-family="sans-serif" font-size="13" fill="#2c3e50" text-anchor="middle" font-weight="500">student</text>

  <!-- Arrow: Input to Transformer -->
  <line x1="300" y1="134" x2="370" y2="134" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Transformer Black Box -->
  <rect x="380" y="70" width="140" height="128" rx="12" fill="#e8e8e8" stroke="#666" stroke-width="2" />
  <text x="450" y="128" font-family="sans-serif" font-size="17" fill="#333" text-anchor="middle" font-weight="700">Transformer</text>
  <text x="450" y="152" font-family="sans-serif" font-size="12" fill="#777" text-anchor="middle" font-style="italic">(Black Box)</text>

  <!-- Arrow: Transformer to Output -->
  <line x1="530" y1="134" x2="600" y2="134" stroke="#555" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Output Sequence Label -->
  <text x="700" y="100" font-family="sans-serif" font-size="15" fill="#444" font-weight="600" text-anchor="middle">Outputs</text>

  <!-- Output Token Boxes -->
  <rect x="615" y="115" width="55" height="38" rx="6" fill="#f5d4d4" stroke="#c77b7b" stroke-width="1.2" />
  <text x="642" y="139" font-family="sans-serif" font-size="13" fill="#2c3e50" text-anchor="middle" font-weight="500">Je</text>

  <rect x="680" y="115" width="55" height="38" rx="6" fill="#f5d4d4" stroke="#c77b7b" stroke-width="1.2" />
  <text x="707" y="139" font-family="sans-serif" font-size="13" fill="#2c3e50" text-anchor="middle" font-weight="500">suis</text>

  <rect x="745" y="115" width="75" height="38" rx="6" fill="#f5d4d4" stroke="#c77b7b" stroke-width="1.2" />
  <text x="782" y="139" font-family="sans-serif" font-size="13" fill="#2c3e50" text-anchor="middle" font-weight="500">étudiant</text>

  <!-- Bottom annotation -->
  <text x="450" y="240" font-family="sans-serif" font-size="12" fill="#999" text-anchor="middle" font-style="italic">A Transformer takes a sequence as input and outputs another sequence</text>
</svg>