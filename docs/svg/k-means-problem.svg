<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#4a90d9;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4a90d9;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d94a4a;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#d94a4a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#d94a4a;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">
    K-Means Problem 視覺化（K=4）
  </text>
  
  <!-- Coordinate System -->
  <line x1="100" y1="450" x2="700" y2="450" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="100" y1="450" x2="100" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Axis Labels -->
  <text x="700" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">x</text>
  <text x="80" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">密度</text>
  
  <!-- X-axis ticks and labels -->
  <line x1="100" y1="450" x2="100" y2="460" stroke="#333" stroke-width="1"/>
  <text x="100" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">-1</text>
  
  <line x1="400" y1="450" x2="400" y2="460" stroke="#333" stroke-width="1"/>
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">0</text>
  
  <line x1="700" y1="450" x2="700" y2="460" stroke="#333" stroke-width="1"/>
  <text x="700" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">+1</text>
  
  <!-- Beta Distribution Curve -->
  <path d="M 100,450 
           C 150,445 200,420 250,350 
           C 280,280 320,180 360,130 
           C 380,110 395,105 400,105 
           C 405,105 420,110 440,130 
           C 480,180 520,280 550,350 
           C 600,420 650,445 700,450" 
        fill="url(#grad1)" stroke="#4a90d9" stroke-width="2.5"/>
  
  <!-- Voronoi Boundaries (vertical dashed lines) -->
  <line x1="250" y1="100" x2="250" y2="450" stroke="#666" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="400" y1="100" x2="400" y2="450" stroke="#666" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="550" y1="100" x2="550" y2="450" stroke="#666" stroke-width="1.5" stroke-dasharray="5,5"/>
  
  <!-- Boundary Labels -->
  <text x="250" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">a₁</text>
  <text x="400" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">a₂=0</text>
  <text x="550" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">a₃</text>
  
  <!-- Centroids (vertical solid lines with markers) -->
  <line x1="185" y1="200" x2="185" y2="450" stroke="#d94a4a" stroke-width="2"/>
  <line x1="325" y1="300" x2="325" y2="450" stroke="#d94a4a" stroke-width="2"/>
  <line x1="475" y1="300" x2="475" y2="450" stroke="#d94a4a" stroke-width="2"/>
  <line x1="615" y1="200" x2="615" y2="450" stroke="#d94a4a" stroke-width="2"/>
  
  <!-- Centroid Markers -->
  <circle cx="185" cy="200" r="8" fill="#d94a4a" stroke="#fff" stroke-width="2"/>
  <circle cx="325" cy="300" r="8" fill="#d94a4a" stroke="#fff" stroke-width="2"/>
  <circle cx="475" cy="300" r="8" fill="#d94a4a" stroke="#fff" stroke-width="2"/>
  <circle cx="615" cy="200" r="8" fill="#d94a4a" stroke="#fff" stroke-width="2"/>
  
  <!-- Centroid Labels -->
  <text x="185" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d94a4a">c₁</text>
  <text x="325" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d94a4a">c₂</text>
  <text x="475" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d94a4a">c₃</text>
  <text x="615" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d94a4a">c₄</text>
  
  <!-- Cluster Region Labels -->
  <text x="175" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a90d9">簇 1</text>
  <text x="325" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a90d9">簇 2</text>
  <text x="475" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a90d9">簇 3</text>
  <text x="625" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a90d9">簇 4</text>
  
  <!-- Legend -->
  <rect x="520" y="120" width="170" height="100" fill="#fff" stroke="#333" stroke-width="1.5" rx="5"/>
  <text x="605" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">圖例</text>
  
  <line x1="535" y1="165" x2="565" y2="165" stroke="#4a90d9" stroke-width="2.5"/>
  <text x="575" y="170" font-family="Arial, sans-serif" font-size="11" fill="#333">Beta 分佈</text>
  
  <line x1="535" y1="185" x2="565" y2="185" stroke="#666" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="575" y="190" font-family="Arial, sans-serif" font-size="11" fill="#333">Voronoi 邊界</text>
  
  <line x1="535" y1="205" x2="565" y2="205" stroke="#d94a4a" stroke-width="2"/>
  <text x="575" y="210" font-family="Arial, sans-serif" font-size="11" fill="#333">質心位置</text>
  
  <circle cx="550" cy="218" r="5" fill="#d94a4a" stroke="#fff" stroke-width="2"/>
  <text x="575" y="223" font-family="Arial, sans-serif" font-size="11" fill="#333">質心點</text>
  
  <!-- Formula Box -->
  <rect x="100" y="500" width="600" height="80" fill="#f8f8f8" stroke="#333" stroke-width="1" rx="5"/>
  <text x="400" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">K-Means 目標函數（連續形式）</text>
  <text x="400" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#333">
    <tspan>𝒞(f</tspan>
    <tspan baseline-shift="sub" font-size="10">X</tspan>
    <tspan>, K) = min</tspan>
    <tspan baseline-shift="sub" font-size="10">{cᵢ}</tspan>
    <tspan> Σ</tspan>
    <tspan baseline-shift="sub" font-size="10">i=1</tspan>
    <tspan baseline-shift="super" font-size="10">K</tspan>
    <tspan> ∫</tspan>
    <tspan baseline-shift="sub" font-size="9">aᵢ₋₁</tspan>
    <tspan baseline-shift="super" font-size="9">aᵢ</tspan>
    <tspan> |x - c</tspan>
    <tspan baseline-shift="sub" font-size="9">i</tspan>
    <tspan>|² · f</tspan>
    <tspan baseline-shift="sub" font-size="10">X</tspan>
    <tspan>(x) dx</tspan>
  </text>
</svg>
