<<svgsvg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <<rectrect width="600" height="400" fill="#1a1a1a" />
  
  <!-- Definitions for arrows -->
  <<defsdefs>
    <<markermarker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <<polygonpolygon points="0 0, 10 3.5, 0 7" fill="#00ffff" />
    </marker>
  </defs>

  <!-- Input Vector -->
  <<rectrect x="50" y="150" width="60" height="100" rx="5" fill="#333" stroke="#00ffff" stroke-width="2" />
  <<texttext x="80" y="205" fill="#fff" font-family="Arial" font-size="14" text-anchor="middle">Input x</text>
  <<texttext x="80" y="220" fill="#aaa" font-family="Arial" font-size="12" text-anchor="middle">d_model</text>

  <!-- Arrow 1 -->
  <<lineline x1="110" y1="200" x2="160" y2="200" stroke="#00ffff" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- W1 Layer (Up-projection) -->
  <<rectrect x="170" y="100" width="80" height="200" rx="5" fill="#2c3e50" stroke="#00ffff" stroke-width="2" />
  <<texttext x="210" y="200" fill="#fff" font-family="Arial" font-size="14" text-anchor="middle">W1</text>
  <<texttext x="210" y="215" fill="#aaa" font-family="Arial" font-size="12" text-anchor="middle">Up-proj</text>
  <<texttext x="210" y="310" fill="#00ffff" font-family="Arial" font-size="12" text-anchor="middle">d_model → d_ff</text>

  <!-- Arrow 2 -->
  <<lineline x1="250" y1="200" x2="300" y2="200" stroke="#00ffff" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Activation Function -->
  <<rectrect x="310" y="170" width="80" height="60" rx="30" fill="#4a148c" stroke="#00ffff" stroke-width="2" />
  <<texttext x="350" y="205" fill="#fff" font-family="Arial" font-size="14" text-anchor="middle">ReLU/GELU</text>

  <!-- Arrow 3 -->
  <<lineline x1="390" y1="200" x2="440" y2="200" stroke="#00ffff" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- W2 Layer (Down-projection) -->
  <<rectrect x="450" y="150" width="80" height="100" rx="5" fill="#2c3e50" stroke="#00ffff" stroke-width="2" />
  <<texttext x="490" y="200" fill="#fff" font-family="Arial" font-size="14" text-anchor="middle">W2</text>
  <<texttext x="490" y="215" fill="#aaa" font-family="Arial" font-size="12" text-anchor="middle">Down-proj</text>
  <<texttext x="490" y="260" fill="#00ffff" font-family="Arial" font-size="12" text-anchor="middle">d_ff → d_model</text>

  <!-- Arrow 4 -->
  <<lineline x1="530" y1="200" x2="570" y2="200" stroke="#00ffff" stroke-width="2" marker-end="url(#arrowhead)" />

  <!-- Output Vector -->
  <<rectrect x="570" y="170" width="20" height="60" rx="5" fill="#333" stroke="#00ffff" stroke-width="2" />
  <<texttext x="580" y="250" fill="#fff" font-family="Arial" font-size="12" text-anchor="middle" transform="rotate(90 580,250)">Output</text>

  <!-- Legend/Labels -->
  <<texttext x="300" y="50" fill="#00ffff" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">Feed-Forward Network (FFN) Structure</text>
</svg>
