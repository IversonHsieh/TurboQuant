<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550">
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" fill="#1a1a2e"/>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff" font-weight="bold">
    Lloyd-Max 演算法迭代收斂過程
  </text>
  
  <!-- Iteration 0 -->
  <text x="150" y="65" text-anchor="middle" font-family="Arial" font-size="14" fill="#888" font-weight="bold">初始 (Iteration 0)</text>
  
  <!-- Iteration 0 - Uniform centroids -->
  <line x1="50" y1="100" x2="250" y2="100" stroke="#666" stroke-width="2"/>
  <circle cx="100" cy="100" r="8" fill="#FF6B6B" opacity="0.5"/>
  <circle cx="140" cy="100" r="8" fill="#FF6B6B" opacity="0.5"/>
  <circle cx="180" cy="100" r="8" fill="#FF6B6B" opacity="0.5"/>
  <circle cx="220" cy="100" r="8" fill="#FF6B6B" opacity="0.5"/>
  <text x="100" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">-0.75</text>
  <text x="140" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">-0.25</text>
  <text x="180" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">0.25</text>
  <text x="220" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">0.75</text>
  
  <!-- Arrow to Iteration 1 -->
  <line x1="250" y1="100" x2="320" y2="100" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowhead2)"/>
  <text x="285" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#4A90D9">更新</text>
  
  <!-- Iteration 1 -->
  <text x="450" y="65" text-anchor="middle" font-family="Arial" font-size="14" fill="#888" font-weight="bold">Iteration 1</text>
  
  <!-- Iteration 1 - Adjusted centroids -->
  <line x1="350" y1="100" x2="550" y2="100" stroke="#666" stroke-width="2"/>
  <circle cx="390" cy="100" r="8" fill="#FF6B6B" opacity="0.7"/>
  <circle cx="440" cy="100" r="8" fill="#FF6B6B" opacity="0.7"/>
  <circle cx="490" cy="100" r="8" fill="#FF6B6B" opacity="0.7"/>
  <circle cx="540" cy="100" r="8" fill="#FF6B6B" opacity="0.7"/>
  <line x1="415" y1="85" x2="415" y2="115" stroke="#FFD93D" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="465" y1="85" x2="465" y2="115" stroke="#FFD93D" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="515" y1="85" x2="515" y2="115" stroke="#FFD93D" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="390" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">-0.80</text>
  <text x="440" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">-0.30</text>
  <text x="490" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">0.30</text>
  <text x="540" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">0.80</text>
  
  <!-- Arrow to Iteration 2 -->
  <line x1="550" y1="100" x2="620" y2="100" stroke="#4A90D9" stroke-width="2" marker-end="url(#arrowhead2)"/>
  <text x="585" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#4A90D9">更新</text>
  
  <!-- Iteration 2 -->
  <text x="750" y="65" text-anchor="middle" font-family="Arial" font-size="14" fill="#888" font-weight="bold">收斂 (Iteration N)</text>
  
  <!-- Iteration 2 - Final centroids -->
  <line x1="650" y1="100" x2="850" y2="100" stroke="#666" stroke-width="2"/>
  <circle cx="700" cy="100" r="8" fill="#FF6B6B"/>
  <circle cx="755" cy="100" r="8" fill="#FF6B6B"/>
  <circle cx="805" cy="100" r="8" fill="#FF6B6B"/>
  <circle cx="850" cy="100" r="8" fill="#FF6B6B"/>
  <line x1="727" y1="85" x2="727" y2="115" stroke="#FFD93D" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="780" y1="85" x2="780" y2="115" stroke="#FFD93D" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="827" y1="85" x2="827" y2="115" stroke="#FFD93D" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="700" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#FF6B6B" font-weight="bold">-0.82</text>
  <text x="755" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#FF6B6B" font-weight="bold">-0.29</text>
  <text x="805" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#FF6B6B" font-weight="bold">0.29</text>
  <text x="850" y="125" text-anchor="middle" font-family="Arial" font-size="10" fill="#FF6B6B" font-weight="bold">0.82</text>
  
  <!-- Distribution curve background -->
  <path d="M 50 180 
           C 100 175, 130 150, 150 120
           C 170 150, 200 175, 250 180" 
        fill="none" stroke="#4A90D9" stroke-width="2" opacity="0.3"/>
  <path d="M 350 180 
           C 400 175, 430 150, 450 120
           C 470 150, 500 175, 550 180" 
        fill="none" stroke="#4A90D9" stroke-width="2" opacity="0.5"/>
  <path d="M 650 180 
           C 700 175, 730 150, 750 120
           C 770 150, 800 175, 850 180" 
        fill="none" stroke="#4A90D9" stroke-width="2" opacity="0.7"/>
  
  <!-- MSE convergence plot -->
  <text x="450" y="220" text-anchor="middle" font-family="Arial" font-size="16" fill="#fff" font-weight="bold">MSE 收斂曲線</text>
  
  <!-- Axes for MSE plot -->
  <line x1="100" y1="250" x2="800" y2="250" stroke="#666" stroke-width="2" marker-end="url(#arrowhead2)"/>
  <line x1="100" y1="250" x2="100" y2="300" stroke="#666" stroke-width="2"/>
  <text x="810" y="255" font-family="Arial" font-size="12" fill="#aaa">迭代次數</text>
  <text x="85" y="240" font-family="Arial" font-size="12" fill="#aaa">MSE</text>
  
  <!-- MSE curve -->
  <path d="M 100 260 
           C 150 280, 200 310, 250 330
           C 300 345, 350 355, 400 360
           C 450 363, 500 365, 550 366
           C 600 367, 650 367.5, 700 368
           C 750 368.2, 780 368.3, 800 368.5" 
        fill="none" stroke="#00FF88" stroke-width="3"/>
  
  <!-- MSE points -->
  <circle cx="100" cy="260" r="5" fill="#00FF88"/>
  <circle cx="200" cy="310" r="5" fill="#00FF88"/>
  <circle cx="300" cy="345" r="5" fill="#00FF88"/>
  <circle cx="400" cy="360" r="5" fill="#00FF88"/>
  <circle cx="500" cy="365" r="5" fill="#00FF88"/>
  <circle cx="600" cy="367" r="5" fill="#00FF88"/>
  <circle cx="700" cy="368" r="5" fill="#00FF88"/>
  <circle cx="800" cy="368.5" r="5" fill="#00FF88"/>
  
  <!-- MSE labels -->
  <text x="100" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">0</text>
  <text x="800" y="250" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">10</text>
  <text x="90" y="265" text-anchor="end" font-family="Arial" font-size="10" fill="#888">高</text>
  <text x="90" y="370" text-anchor="end" font-family="Arial" font-size="10" fill="#888">低</text>
  
  <!-- Algorithm steps -->
  <rect x="100" y="400" width="700" height="130" fill="#2a2a3e" stroke="#444" stroke-width="1" rx="5"/>
  <text x="450" y="425" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff" font-weight="bold">Lloyd-Max 演算法步驟</text>
  
  <text x="130" y="450" font-family="Arial" font-size="12" fill="#FFD93D" font-weight="bold">步驟 1:</text>
  <text x="190" y="450" font-family="Arial" font-size="12" fill="#aaa">初始化量化層級（例如：均勻分佈）</text>
  
  <text x="130" y="475" font-family="Arial" font-size="12" fill="#FFD93D" font-weight="bold">步驟 2:</text>
  <text x="190" y="475" font-family="Arial" font-size="12" fill="#aaa">計算決策邊界：bᵢ = (cᵢ + cᵢ₊₁) / 2</text>
  
  <text x="130" y="500" font-family="Arial" font-size="12" fill="#FFD93D" font-weight="bold">步驟 3:</text>
  <text x="190" y="500" font-family="Arial" font-size="12" fill="#aaa">計算新質心：cᵢ = E[X | bᵢ₋₁ ≤ X < bᵢ]</text>
  
  <text x="130" y="525" font-family="Arial" font-size="12" fill="#00FF88" font-weight="bold">步驟 4:</text>
  <text x="190" y="525" font-family="Arial" font-size="12" fill="#aaa">重複步驟 2-3 直到收斂（MSE 變化小於閾值）</text>
</svg>
