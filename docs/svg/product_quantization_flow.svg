<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="200" fill="#1e1e1e" />
  
  <!-- Header -->
  <text x="20" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Vector Quantization Process</text>
  
  <!-- Input Vector -->
  <rect x="20" y="50" width="560" height="30" rx="5" ry="5" fill="url(#grad1)" />
  <text x="30" y="70" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ffffff">Input Vector (128d)</text>
  
  <!-- Arrow -->
  <path d="M 300 80 L 300 100" stroke="#bdc3c7" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Decomposition Boxes -->
  <rect x="20" y="110" width="60" height="40" rx="5" ry="5" fill="#3498db" />
  <text x="30" y="135" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ffffff">Sub 1</text>
  
  <rect x="90" y="110" width="60" height="40" rx="5" ry="5" fill="#3498db" />
  <text x="100" y="135" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ffffff">Sub 2</text>
  
  <text x="165" y="135" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#bdc3c7">...</text>
  
  <rect x="520" y="110" width="60" height="40" rx="5" ry="5" fill="#3498db" />
  <text x="530" y="135" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#ffffff">Sub 8</text>
  
  <!-- Indices -->
  <text x="20" y="180" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ffffff" font-weight="bold">Output: [idx₁, idx₂, ..., idx₈]</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bdc3c7" />
    </marker>
  </defs>
</svg>
