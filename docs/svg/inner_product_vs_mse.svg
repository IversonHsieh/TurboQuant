<svg width="780" height="520" viewBox="0 0 780 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ax-a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="vx-a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4fc3f7"/>
    </marker>
    <marker id="vxh-a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffb74d"/>
    </marker>
    <marker id="vq-a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#81c784"/>
    </marker>
    <linearGradient id="bg-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
    <filter id="gl-c" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl-o" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl-g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl-p" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl-r" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="520" fill="url(#bg-g)" rx="12"/>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="18" font-weight="bold" fill="#e0e0e0">MSE 失真 vs 內積失真 — 幾何意義比較</text>

  <!-- ==================== LEFT PANEL: MSE ==================== -->
  <g transform="translate(30, 50)">
    <!-- Panel background -->
    <rect width="340" height="280" rx="10" fill="#141620" stroke="#2a2d3a" stroke-width="1"/>

    <!-- Panel title -->
    <text x="170" y="25" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="bold" fill="#4fc3f7">(a) MSE 失真</text>

    <!-- Subtitle -->
    <text x="170" y="44" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#888">衡量向量端點之間的歐氏距離</text>

    <!-- Axes -->
    <line x1="40" y1="240" x2="310" y2="240" stroke="#444" stroke-width="1.2" marker-end="url(#ax-a)"/>
    <line x1="40" y1="240" x2="40" y2="60" stroke="#444" stroke-width="1.2" marker-end="url(#ax-a)"/>

    <!-- Grid dots -->
    <g fill="#222" opacity="0.5">
      <circle cx="100" cy="240" r="1.5"/><circle cx="160" cy="240" r="1.5"/>
      <circle cx="220" cy="240" r="1.5"/><circle cx="280" cy="240" r="1.5"/>
      <circle cx="40" cy="200" r="1.5"/><circle cx="40" cy="160" r="1.5"/>
      <circle cx="40" cy="120" r="1.5"/><circle cx="40" cy="80" r="1.5"/>
    </g>

    <!-- Original vector x -->
    <line x1="40" y1="240" x2="240" y2="90" stroke="#4fc3f7" stroke-width="2.8" marker-end="url(#vx-a)" filter="url(#gl-c)"/>
    <circle cx="240" cy="90" r="4" fill="#4fc3f7" filter="url(#gl-c)"/>
    <text x="248" y="82" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="bold" fill="#4fc3f7">x</text>

    <!-- Quantized vector x̂ -->
    <line x1="40" y1="240" x2="210" y2="120" stroke="#ffb74d" stroke-width="2.8" marker-end="url(#vxh-a)" filter="url(#gl-o)"/>
    <circle cx="210" cy="120" r="4" fill="#ffb74d" filter="url(#gl-o)"/>
    <text x="218" y="115" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="bold" fill="#ffb74d">x̂</text>

    <!-- Error vector (dashed, red) -->
    <line x1="210" y1="120" x2="240" y2="90" stroke="#ef5350" stroke-width="2.5" stroke-dasharray="6,3" filter="url(#gl-r)"/>
    <circle cx="210" cy="120" r="3" fill="#ffb74d"/>
    <circle cx="240" cy="90" r="3" fill="#4fc3f7"/>

    <!-- MSE label on the error vector -->
    <rect x="195" y="88" width="70" height="22" rx="4" fill="#2a1015" stroke="#ef5350" stroke-width="0.8" opacity="0.9"/>
    <text x="230" y="103" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="bold" fill="#ef5350">‖x − x̂‖₂²</text>

    <!-- MSE formula box -->
    <rect x="55" y="255" width="230" height="22" rx="4" fill="#141620" stroke="#4fc3f7" stroke-width="0.8" opacity="0.8"/>
    <text x="170" y="270" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#4fc3f7">
      MSE = Σᵢ(xᵢ − x̂ᵢ)² = ‖x − x̂‖₂²
    </text>
  </g>

  <!-- ==================== RIGHT PANEL: Inner Product Distortion ==================== -->
  <g transform="translate(410, 50)">
    <!-- Panel background -->
    <rect width="340" height="280" rx="10" fill="#141620" stroke="#2a2d3a" stroke-width="1"/>

    <!-- Panel title -->
    <text x="170" y="25" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="bold" fill="#81c784">(b) 內積失真</text>

    <!-- Subtitle -->
    <text x="170" y="44" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#888">衡量在查詢方向上的投影差異</text>

    <!-- Axes -->
    <line x1="40" y1="240" x2="310" y2="240" stroke="#444" stroke-width="1.2" marker-end="url(#ax-a)"/>
    <line x1="40" y1="240" x2="40" y2="60" stroke="#444" stroke-width="1.2" marker-end="url(#ax-a)"/>

    <!-- Grid dots -->
    <g fill="#222" opacity="0.5">
      <circle cx="100" cy="240" r="1.5"/><circle cx="160" cy="240" r="1.5"/>
      <circle cx="220" cy="240" r="1.5"/><circle cx="280" cy="240" r="1.5"/>
      <circle cx="40" cy="200" r="1.5"/><circle cx="40" cy="160" r="1.5"/>
      <circle cx="40" cy="120" r="1.5"/><circle cx="40" cy="80" r="1.5"/>
    </g>

    <!-- Query vector q (green) -->
    <line x1="40" y1="240" x2="280" y2="120" stroke="#81c784" stroke-width="2.5" marker-end="url(#vq-a)" filter="url(#gl-g)" opacity="0.85"/>
    <text x="288" y="115" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="bold" fill="#81c784">q</text>

    <!-- Original vector x (cyan) -->
    <line x1="40" y1="240" x2="220" y2="80" stroke="#4fc3f7" stroke-width="2.8" marker-end="url(#vx-a)" filter="url(#gl-c)"/>
    <circle cx="220" cy="80" r="4" fill="#4fc3f7" filter="url(#gl-c)"/>
    <text x="228" y="72" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="bold" fill="#4fc3f7">x</text>

    <!-- Quantized vector x̂ (orange) -->
    <line x1="40" y1="240" x2="190" y2="130" stroke="#ffb74d" stroke-width="2.8" marker-end="url(#vxh-a)" filter="url(#gl-o)"/>
    <circle cx="190" cy="130" r="4" fill="#ffb74d" filter="url(#gl-o)"/>
    <text x="198" y="125" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="bold" fill="#ffb74d">x̂</text>

    <!-- Projection of x onto q -->
    <line x1="220" y1="80" x2="195" y2="155" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
    <circle cx="195" cy="155" r="4" fill="#4fc3f7" opacity="0.8"/>
    <text x="200" y="150" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#4fc3f7" opacity="0.9">proj_q(x)</text>

    <!-- Projection of x̂ onto q -->
    <line x1="190" y1="130" x2="175" y2="168" stroke="#ffb74d" stroke-width="1" stroke-dasharray="5,4" opacity="0.5"/>
    <circle cx="175" cy="168" r="4" fill="#ffb74d" opacity="0.8"/>
    <text x="130" y="183" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#ffb74d" opacity="0.9">proj_q(x̂)</text>

    <!-- Inner product distortion (pink highlight) -->
    <line x1="175" y1="168" x2="195" y2="155" stroke="#e879f9" stroke-width="5" stroke-linecap="round" filter="url(#gl-p)" opacity="0.9"/>

    <!-- Distortion label -->
    <rect x="100" y="195" width="160" height="22" rx="4" fill="#1e1030" stroke="#e879f9" stroke-width="0.8" opacity="0.9"/>
    <text x="180" y="210" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="bold" fill="#e879f9">|⟨q, x⟩ − ⟨q, x̂⟩|</text>

    <!-- Formula box -->
    <rect x="55" y="255" width="230" height="22" rx="4" fill="#141620" stroke="#81c784" stroke-width="0.8" opacity="0.8"/>
    <text x="170" y="270" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#81c784">
      D_prod = E[|⟨y, x⟩ − ⟨y, x̂⟩|²]
    </text>
  </g>

  <!-- ==================== COMPARISON TABLE ==================== -->
  <rect x="30" y="345" width="720" height="155" rx="10" fill="#141620" stroke="#2a2d3a" stroke-width="1"/>

  <!-- Table title -->
  <text x="390" y="370" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">MSE 失真 vs 內積失真 — 特性比較</text>

  <!-- Header row -->
  <rect x="40" y="380" width="700" height="24" rx="3" fill="#1e2235"/>
  <text x="130" y="396" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="bold" fill="#aaa">特性</text>
  <text x="330" y="396" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="bold" fill="#4fc3f7">MSE 失真</text>
  <text x="570" y="396" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="bold" fill="#81c784">內積失真</text>

  <!-- Separator -->
  <line x1="40" y1="406" x2="740" y2="406" stroke="#2a2d3a" stroke-width="0.5"/>

  <!-- Row 1: Definition -->
  <text x="130" y="424" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#ccc">定義</text>
  <text x="330" y="424" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#ccc">‖x − x̂‖₂²</text>
  <text x="570" y="424" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#ccc">|⟨y, x⟩ − ⟨y, x̂⟩|²</text>

  <!-- Row 2: Query dependence -->
  <text x="130" y="446" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#ccc">依賴查詢向量</text>
  <text x="330" y="446" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#ef5350" font-weight="bold">✗ 否</text>
  <text x="570" y="446" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#81c784" font-weight="bold">✓ 是</text>

  <!-- Row 3: Geometric meaning -->
  <text x="130" y="468" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#ccc">幾何意義</text>
  <text x="330" y="468" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#ccc">端點歐氏距離平方</text>
  <text x="570" y="468" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#ccc">查詢方向投影差異</text>

  <!-- Row 4: TurboQuant variant -->
  <text x="130" y="490" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#ccc">TurboQuant 變體</text>
  <text x="330" y="490" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#4fc3f7" font-weight="bold">Q_mse</text>
  <text x="570" y="490" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#81c784" font-weight="bold">Q_prod（無偏）</text>

  <!-- Key insight box -->
  <rect x="50" y="345" width="0" height="0" rx="0" fill="none"/>
</svg>
