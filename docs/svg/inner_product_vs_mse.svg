<svg width="700" height="380" viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#181c20"/>
  
  <!-- 定義箭頭 -->
  <defs>
    <marker id="axis-arrow-mse" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#bbb" />
    </marker>
    <marker id="x-arrow-mse" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4fc3f7" />
    </marker>
    <marker id="xhat-arrow-mse" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffb74d" />
    </marker>
    <marker id="q-arrow-mse" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#81c784" />
    </marker>
    <!-- Voronoi 區域漸層 -->
    <radialGradient id="voronoi-mse1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="voronoi-mse2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffb74d;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#ffb74d;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- 標題 -->
  <text x="350" y="25" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0" text-anchor="middle">內積誤差 vs MSE (Inner Product Error vs MSE)</text>
  
  <!-- 左圖：MSE 示意圖 -->
  <g transform="translate(30, 55)">
    <text x="140" y="-10" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0">(a) MSE（均方誤差）</text>
    
    <!-- 座標軸 -->
    <line x1="0" y1="220" x2="280" y2="220" stroke="#bbb" stroke-width="2" marker-end="url(#axis-arrow-mse)"/>
    <line x1="0" y1="220" x2="0" y2="0" stroke="#bbb" stroke-width="2" marker-end="url(#axis-arrow-mse)"/>
    <text x="285" y="225" font-family="sans-serif" font-size="11" fill="#bbb">維度 1</text>
    <text x="-5" y="-5" font-family="sans-serif" font-size="11" fill="#bbb">維度 2</text>
    
    <!-- 原始向量 x -->
    <line x1="0" y1="220" x2="200" y2="70" stroke="#4fc3f7" stroke-width="2.5" marker-end="url(#x-arrow-mse)"/>
    <text x="205" y="65" font-family="sans-serif" font-size="13" fill="#4fc3f7" font-weight="bold">x</text>
    <circle cx="200" cy="70" r="4" fill="#4fc3f7"/>
    
    <!-- 量化後向量 x̂ -->
    <line x1="0" y1="220" x2="180" y2="95" stroke="#ffb74d" stroke-width="2.5" marker-end="url(#xhat-arrow-mse)"/>
    <text x="185" y="90" font-family="sans-serif" font-size="13" fill="#ffb74d" font-weight="bold">x̂</text>
    <circle cx="180" cy="95" r="4" fill="#ffb74d"/>
    
    <!-- 誤差向量 (MSE) -->
    <line x1="180" y1="95" x2="200" y2="70" stroke="#fff" stroke-width="2.5" stroke-dasharray="4,3"/>
    <circle cx="180" cy="95" r="3.5" fill="#ffb74d"/>
    <circle cx="200" cy="70" r="3.5" fill="#4fc3f7"/>
    
    <!-- MSE 區域著色 -->
    <ellipse cx="190" cy="82" rx="40" ry="30" fill="url(#voronoi-mse1)"/>
    
    <!-- MSE 標示 -->
    <text x="210" y="85" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold">‖x-x̂‖²</text>
    <text x="140" y="255" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#bdbdbd">MSE = 歐氏距離的平方</text>
  </g>
  
  <!-- 右圖：內積誤差示意圖 -->
  <g transform="translate(350, 55)">
    <text x="140" y="-10" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e0e0e0">(b) 內積誤差</text>
    
    <!-- 座標軸 -->
    <line x1="0" y1="220" x2="280" y2="220" stroke="#bbb" stroke-width="2" marker-end="url(#axis-arrow-mse)"/>
    <line x1="0" y1="220" x2="0" y2="0" stroke="#bbb" stroke-width="2" marker-end="url(#axis-arrow-mse)"/>
    <text x="285" y="225" font-family="sans-serif" font-size="11" fill="#bbb">維度 1</text>
    <text x="-5" y="-5" font-family="sans-serif" font-size="11" fill="#bbb">維度 2</text>
    
    <!-- 查詢向量 q -->
    <line x1="0" y1="220" x2="250" y2="120" stroke="#81c784" stroke-width="2.5" marker-end="url(#q-arrow-mse)"/>
    <text x="255" y="115" font-family="sans-serif" font-size="13" fill="#81c784" font-weight="bold">q</text>
    <circle cx="250" cy="120" r="4" fill="#81c784"/>
    
    <!-- 原始向量 x -->
    <line x1="0" y1="220" x2="200" y2="70" stroke="#4fc3f7" stroke-width="2.5" marker-end="url(#x-arrow-mse)"/>
    <text x="205" y="65" font-family="sans-serif" font-size="13" fill="#4fc3f7" font-weight="bold">x</text>
    <circle cx="200" cy="70" r="4" fill="#4fc3f7"/>
    
    <!-- 量化後向量 x̂ -->
    <line x1="0" y1="220" x2="180" y2="95" stroke="#ffb74d" stroke-width="2.5" marker-end="url(#xhat-arrow-mse)"/>
    <text x="185" y="90" font-family="sans-serif" font-size="13" fill="#ffb74d" font-weight="bold">x̂</text>
    <circle cx="180" cy="95" r="4" fill="#ffb74d"/>
    
    <!-- x 在 q 上的投影 -->
    <line x1="200" y1="70" x2="175" y2="138" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="175" cy="138" r="3.5" fill="#4fc3f7"/>
    
    <!-- x̂ 在 q 上的投影 -->
    <line x1="180" y1="95" x2="160" y2="150" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
    <circle cx="160" cy="150" r="3.5" fill="#ffb74d"/>
    
    <!-- 投影長度差異（內積誤差） -->
    <line x1="160" y1="150" x2="175" y2="138" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="160" cy="150" r="4.5" fill="#fff"/>
    <circle cx="175" cy="138" r="4.5" fill="#fff"/>
    
    <!-- 內積誤差標示 -->
    <text x="140" y="175" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">|⟨q,x⟩-⟨q,x̂⟩|</text>
    <text x="140" y="255" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#bdbdbd">內積誤差 = 在 q 方向上投影長度的差異</text>
  </g>
  
  <!-- 底部比較表格 -->
  <rect x="30" y="290" width="640" height="75" fill="#23272e" stroke="#444" stroke-width="1" rx="8"/>
  
  <!-- 表格標題 -->
  <text x="180" y="315" font-family="sans-serif" font-size="12" font-weight="bold" fill="#e0e0e0" text-anchor="middle">特性</text>
  <text x="350" y="315" font-family="sans-serif" font-size="12" font-weight="bold" fill="#4fc3f7" text-anchor="middle">MSE（均方誤差）</text>
  <text x="520" y="315" font-family="sans-serif" font-size="12" font-weight="bold" fill="#81c784" text-anchor="middle">內積誤差</text>
  
  <!-- 分隔線 -->
  <line x1="50" y1="325" x2="650" y2="325" stroke="#444" stroke-width="1"/>
  
  <!-- 表格內容 -->
  <text x="180" y="345" font-family="sans-serif" font-size="11" fill="#bdbdbd" text-anchor="middle">數學定義</text>
  <text x="350" y="345" font-family="sans-serif" font-size="11" fill="#bdbdbd" text-anchor="middle">‖x - x̂‖₂²</text>
  <text x="520" y="345" font-family="sans-serif" font-size="11" fill="#bdbdbd" text-anchor="middle">⟨q, x - x̂⟩</text>
  
  <text x="180" y="360" font-family="sans-serif" font-size="11" fill="#bdbdbd" text-anchor="middle">依賴查詢向量</text>
  <text x="350" y="360" font-family="sans-serif" font-size="11" fill="#bdbdbd" text-anchor="middle">✗ 否</text>
  <text x="520" y="360" font-family="sans-serif" font-size="11" fill="#bdbdbd" text-anchor="middle">✓ 是</text>
  
  <!-- 關鍵洞察 -->
  <rect x="30" y="375" width="640" height="0" fill="none"/>
  <text x="350" y="395" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">
    <tspan fill="#ffb74d">關鍵洞察：</tspan> 兩個向量可以有相同的 MSE，但內積誤差完全不同 — 這取決於它們相對於查詢向量 q 的方向
  </text>
</svg>
