<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <!-- Background -->
  <rect width="600" height="450" fill="#020617" />

  <!-- Definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="grad-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Encoder Container -->
  <rect x="50" y="40" width="500" height="380" rx="16" ry="16" fill="#0f172a" stroke="#1e203b" stroke-width="2" />
  <text x="70" y="75" font-family="sans-serif" font-size="18" font-weight="bold" fill="#94a3b8" letter-spacing="1">ENCODER LAYER</text>

  <!-- Input Arrow -->
  <line x1="300" y1="20" x2="300" y2="100" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrowhead)" />
  <text x="310" y="60" font-family="sans-serif" font-size="14" fill="#64748b">Input Embedding</text>

  <!-- Self-Attention Layer -->
  <rect x="100" y="120" width="400" height="100" rx="12" ry="12" fill="#1e293b" stroke="url(#grad-amber)" stroke-width="2.5" filter="url(#glow-amber)" />
  <text x="300" y="175" font-family="sans-serif" font-size="20" text-anchor="middle" fill="#fbbf24" font-weight="bold">Self-Attention</text>

  <!-- Feed Forward Layer -->
  <rect x="100" y="280" width="400" height="100" rx="12" ry="12" fill="#1e293b" stroke="url(#grad-cyan)" stroke-width="2.5" filter="url(#glow-cyan)" />
  <text x="300" y="335" font-family="sans-serif" font-size="20" text-anchor="middle" fill="#38bdf8" font-weight="bold">Feed Forward</text>

  <!-- Residual Connections (The "Skip" paths) -->
  <!-- Path 1: Around Self-Attention -->
  <path d="M 100 170 Q 50 170, 50 240 Q 50 310, 100 310" fill="none" stroke="#334155" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />
  <text x="60" y="240" font-family="sans-serif" font-size="12" fill="#64748b" transform="rotate(-90, 60, 240)">Residual Connection</text>

  <!-- Path 2: Around Feed Forward -->
  <path d="M 500 330 Q 550 330, 550 240 Q 550 170, 500 170" fill="none" stroke="#334155" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowhead)" />
  <text x="540" y="240" font-family="sans-serif" font-size="12" fill="#64748b" transform="rotate(90, 540, 240)">Residual Connection</text>

  <!-- Inter-layer Arrow -->
  <line x1="300" y1="220" x2="300" y2="280" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrowhead)" />

  <!-- Output Arrow -->
  <line x1="300" y1="380" x2="300" y2="430" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrowhead)" />
  <text x="310" y="415" font-family="sans-serif" font-size="14" fill="#64748b">Output Representation</text>

  <!-- Layer Norm Indicators -->
  <circle cx="300" cy="220" r="15" fill="#0f172a" stroke="#475569" stroke-width="2" />
  <text x="300" y="225" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#94a3b8" font-weight="bold">LN</text>

  <circle cx="300" cy="380" r="15" fill="#0f172a" stroke="#475569" stroke-width="2" />
  <text x="300" y="385" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#94a3b8" font-weight="bold">LN</text>

</svg>